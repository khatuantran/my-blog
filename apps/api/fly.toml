# Fly.io config cho apps/api (NestJS BE). App: kha-blog-api (kha-blog-api.fly.dev).
# DEPLOY TỪ REPO ROOT — `.` đặt build context = root (Dockerfile cần lockfile + workspace manifests):
#   fly deploy . --config apps/api/fly.toml
# Secrets (DATABASE_URL/JWT/ADMIN/CLOUDINARY...) KHÔNG để ở đây — set qua `fly secrets set`.
# Runbook đầy đủ: docs/DEPLOYMENT.md > Backend Deploy (Fly.io).
# Lưu ý: flyctl normalize file này khi `fly launch`/`fly config save` (strip comment, đổi quote).
app = 'kha-blog-api'
primary_region = 'sin'                       # Singapore — gần VN nhất trong free tier

[build]
  # flyctl resolve dockerfile = dir(fly.toml) + giá trị này → apps/api/Dockerfile.
  # PHẢI để 'Dockerfile' (KHÔNG 'apps/api/Dockerfile' → sẽ thành apps/api/apps/api/Dockerfile).
  dockerfile = 'Dockerfile'

# Chạy migrate TRƯỚC khi release machine mới nhận traffic. Migration fail → Fly abort release.
[deploy]
  release_command = 'pnpm exec prisma migrate deploy'

[env]
  NODE_ENV = 'production'
  PORT = '3001'
  STORAGE_DRIVER = 'cloudinary'              # prod dùng Cloudinary signed upload (ADR-010)
  TRUST_PROXY = '1'

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = 'stop'                # free-tier: scale-to-zero khi idle (đánh đổi cold-start)
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = '15s'
    timeout = '2s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  size = 'shared-cpu-1x'
  # 512mb BẮT BUỘC: 256mb không đủ cho NestJS boot (app thrash/treo lúc init → không listen
  # → health check fail → PR01 'no healthy instances'). Sự cố 2026-06-02 — flyctl từng hạ
  # xuống 256mb khi normalize, gây treo. KHÔNG hạ lại dưới 512mb.
  memory = '512mb'
  cpus = 1
  memory_mb = 512
