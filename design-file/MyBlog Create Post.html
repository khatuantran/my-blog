<html lang="en">
<head>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500&family=JetBrains+Mono:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
html,body { height:100%; }
body { background:#0A0E1A; background-image:radial-gradient(circle,#2A354822 1px,transparent 1px); background-size:24px 24px; color:#E6EDF3; font-family:'Inter',sans-serif; overflow-x:hidden; }
body::after { content:''; position:fixed; top:0; left:0; right:0; bottom:0; background:repeating-linear-gradient(0deg,transparent 0px,transparent 2px,rgba(0,0,0,.028) 2px,rgba(0,0,0,.028) 4px); pointer-events:none; z-index:9999; }
@keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
@keyframes pulse  { 0%,100%{opacity:.7} 50%{opacity:1;filter:drop-shadow(0 0 3px currentColor)} }
::-webkit-scrollbar { width:5px; } ::-webkit-scrollbar-track { background:#0A0E1A; } ::-webkit-scrollbar-thumb { background:#2A3548; border-radius:3px; }
.pulse { animation:pulse 2s ease-in-out infinite; }
.srch-inp { width:100%; background:#0A0E1A; border:1px solid #2A3548; color:#A0AEC0; font-family:'JetBrains Mono',monospace; font-size:14px; padding:8px 70px 8px 36px; border-radius:6px; outline:none; transition:all .15s; }
.srch-inp:focus { border-color:#00FFE5; box-shadow:0 0 14px rgba(0,255,229,.22); color:#E6EDF3; }
.srch-inp::placeholder { color:#8B96AA; font-style:italic; }
.cp-item { display:flex; align-items:center; gap:10px; padding:8px 16px; cursor:pointer; transition:background .1s; }
.cp-item:hover { background:rgba(0,255,229,.08); }
.fade-up { animation:fadeUp .15s ease; }
.sb-lbl { font-family:'JetBrains Mono',monospace; font-size:11px; color:#8B96AA; letter-spacing:.05em; margin-bottom:8px; display:flex; align-items:center; gap:8px; }
.sb-lbl::after { content:''; flex:1; height:1px; background:#1F2A3A; }
.editor-area { width:100%; background:#070A14; border:1px solid #2A3548; color:#E6EDF3; font-family:'Inter',sans-serif; font-size:15px; padding:14px; border-radius:6px; outline:none; min-height:220px; line-height:1.7; transition:border-color .15s; overflow-y:auto; }
.editor-area:focus { border-color:#00FFE5; box-shadow:0 0 12px rgba(0,255,229,.1); }
.editor-area:empty::before { content:attr(data-placeholder); color:#566176; font-style:italic; pointer-events:none; }
.editor-area mark { background:#E0AF6840; color:#E0AF68; padding:0 2px; border-radius:2px; }
.editor-area b, .editor-area strong { color:#E6EDF3; font-weight:700; }
.editor-area a { color:#00FFE5; text-decoration:underline; }
.editor-area ul, .editor-area ol { padding-left:24px; margin:6px 0; }
.editor-area h1 { font-size:22px; font-weight:700; margin:8px 0 4px; color:#E6EDF3; }
.editor-area h2 { font-size:18px; font-weight:600; margin:8px 0 4px; color:#E6EDF3; }
.tag-inp { background:transparent; border:none; outline:none; font-family:'JetBrains Mono',monospace; font-size:13px; color:#C9D1D9; min-width:100px; }
.tag-inp::placeholder { color:#8B96AA; }
.btn-publish { font-family:'JetBrains Mono',monospace; font-size:13px; font-weight:600; color:#0A0E1A; background:#00FFE5; border:none; border-radius:6px; padding:8px 20px; cursor:pointer; transition:all .15s; box-shadow:0 0 14px rgba(0,255,229,.3); }
.btn-publish:hover { background:#00FFE5cc; box-shadow:0 0 22px rgba(0,255,229,.5); }
.btn-draft { font-family:'JetBrains Mono',monospace; font-size:13px; color:#8B96AA; background:#1A1F2E; border:1px solid #2A3548; border-radius:6px; padding:8px 20px; cursor:pointer; transition:all .15s; }
.btn-draft:hover { color:#E6EDF3; border-color:#3D4A63; }
.toolbar-btn { background:transparent; border:1px solid #2A3548; border-radius:4px; color:#8B96AA; cursor:pointer; width:32px; height:30px; padding:0; display:inline-flex; align-items:center; justify-content:center; font-family:'JetBrains Mono',monospace; font-size:13px; transition:all .15s; flex-shrink:0; }
.toolbar-btn:hover { color:#E6EDF3; border-color:#3D4A63; background:#1A1F2E; }
@keyframes dashedPulse { 0%,100%{border-color:#2A3548} 50%{border-color:#3D4A63} }
.upload-zone { border:2px dashed #2A3548; border-radius:8px; padding:28px 20px; text-align:center; cursor:pointer; transition:all .15s; animation:dashedPulse 2s ease-in-out infinite; }
.upload-zone:hover { border-color:#00FFE580; background:rgba(0,255,229,.03); }
@media(max-width:900px) { .preview-col { display:none !important; } }

/* Post-bump fixes — keep small UI badges/pills/labels on one line */
span[style*="JetBrains Mono"], span[style*="JetBrains Mono,monospace"] { white-space: nowrap; }
/* Mood badges, filter chips, stat deltas — inline-flex content must not wrap */
[style*="inline-flex"][style*="JetBrains Mono"] { flex-shrink: 0; white-space: nowrap; }
/* Bracket badges like [ ADMIN ], [ v0.1.0 ] */
.flt-btn, .sort-btn, .filter-chip, .act-btn, .skill-badge, .tab-btn, .act-ghost { white-space: nowrap; flex-shrink: 0; }


/* Post-bump nowrap fixes v2 — broader, with restored wrap containers */
[style*="JetBrains"] { white-space: nowrap; }
.sb-lbl, .sb-lbl > *, .glitch { white-space: nowrap !important; }
/* Restore wrap-sensitive containers */
.code-bl, pre.code-bl { white-space: pre !important; }
.editor-area, .comment-inp, textarea { white-space: pre-wrap !important; }
.sb-lbl::after { white-space: normal !important; }


/* Mobile topbar — hide search to prevent overlap with logo/avatar */
@media (max-width: 820px) {
  header > div[style*="position: absolute"] { display: none !important; }
}
@media (max-width: 560px) {
  /* Hide version badge + online count on very small screens */
  header > div[style*="margin-left: auto"] > span:nth-child(1),
  header > div[style*="margin-left: auto"] > span:nth-child(2) { display: none !important; }
  /* Compact logo subtitle */
  header [style*="personal"] { display: none !important; }
}


/* ==== Mobile responsive v2 — real adaptive layout ==== */
@media (max-width: 980px) {
  /* Stack 4-col stat grids → 2 cols */
  [style*="grid-template-columns: repeat(4"],
  [style*="grid-template-columns:repeat(4"] {
    grid-template-columns: repeat(2, 1fr) !important;
  }
  /* Sub-bar items wrap */
  div[style*="height: 44px"][style*="border-bottom"] { flex-wrap: wrap !important; height: auto !important; padding-top: 8px !important; padding-bottom: 8px !important; row-gap: 6px !important; }
  /* Topbar nav: tighten */
  header { padding-left: 12px !important; padding-right: 12px !important; }
}
@media (max-width: 760px) {
  /* Main padding compression */
  main, [style*="padding: 20px 24px"], [style*="padding:'20px 24px'"] { padding-left: 14px !important; padding-right: 14px !important; }
  /* Tables with many cols → horizontal scroll instead of breaking */
  [style*="grid-template-columns: 3fr"],
  [style*="grid-template-columns: 2fr"] { min-width: 720px !important; }
  /* Wrap their containers so they scroll instead of overlap */
  div[style*="border-radius: 8px"][style*="overflow: hidden"]:has([style*="grid-template-columns: 3fr"]),
  div[style*="border-radius: 8px"][style*="overflow: hidden"]:has([style*="grid-template-columns: 2fr"]) {
    overflow-x: auto !important;
  }
  /* Stat cards smaller */
  [style*="font-size: 22px"][style*="font-weight: 700"],
  [style*="font-size:22px"] { font-size: 18px !important; }
  /* Hero on Profile: stack and shrink */
  .profile-hero { flex-direction: column !important; align-items: flex-start !important; gap: 12px !important; }
  /* Modal full-bleed-ish */
  [style*="width: 640px"], [style*="width: 560px"], [style*="width: 540px"], [style*="width: 480px"], [style*="width: 440px"], [style*="width: 420px"], [style*="width: 400px"], [style*="width: 380px"], [style*="width: 360px"] {
    width: calc(100vw - 24px) !important;
    max-width: calc(100vw - 24px) !important;
  }
  /* Right drawer (profile settings) full-width */
  [style*="width: 480px"][style*="height: 100vh"] { width: 100vw !important; }
  /* Hide Create Post preview column already gone via .preview-col */
  /* Big heading shrink */
  h1[style*="font-size: 26px"] { font-size: 22px !important; }
}
@media (max-width: 480px) {
  /* 2-col grids → 1 col */
  [style*="grid-template-columns: repeat(2"],
  [style*="grid-template-columns:repeat(2"] {
    grid-template-columns: 1fr !important;
  }
  /* Even tighter padding */
  main, [style*="padding: 24px 28px"], [style*="padding:'24px 28px'"] { padding-left: 12px !important; padding-right: 12px !important; }
  /* Login card padding */
  [style*="padding: 22px 20px"] { padding: 16px !important; }
  /* Status bar info — hide some segments */
  div[style*="bottom: 0"][style*="height: 28px"] span:nth-of-type(n+3) { display: none !important; }
}
/* Touch-friendly tap targets globally on mobile */
@media (max-width: 760px) and (pointer: coarse) {
  button, .toolbar-btn, .filter-chip, .sort-btn, .act-btn { min-height: 36px !important; }
}


/* ==== Mobile responsive v3 — prevent overflow + tight layout ==== */
html, body { max-width: 100vw; overflow-x: hidden; }
@media (max-width: 640px) {
  /* Topbar: bring right cluster fully inside viewport */
  header { padding-left: 10px !important; padding-right: 10px !important; gap: 0 !important; }
  header > div[style*="margin-left: auto"] { gap: 6px !important; }
  /* Logo: drop subtitle for sure, shrink */
  header svg { width: 20px !important; height: 20px !important; }
  /* Notification dropdown: full width near viewport */
  header [style*="width: 380px"] { width: calc(100vw - 20px) !important; right: -8px !important; }
  /* Avatar dropdown menu */
  header [style*="min-width: 210px"] { right: -4px !important; }
  /* Feed filter row: don't push 'Latest' off-screen with margin-left:auto */
  .flt-btn[style*="margin-left: auto"], button[style*="margin-left: auto"][style*="Latest"] {
    margin-left: 0 !important;
  }
  /* Common pattern: anything with margin-left:auto in a flex row at mobile becomes wrap-friendly */
  div[style*="display: flex"][style*="flex-wrap: wrap"] > [style*="margin-left: auto"] {
    margin-left: 0 !important;
  }
  /* Post cards: tighter padding */
  .post-card { padding: 14px !important; }
  /* Tags page card grid */
  div[style*="grid-template-columns: repeat(auto-fill, minmax(240px"] {
    grid-template-columns: 1fr !important;
  }
  div[style*="grid-template-columns: repeat(auto-fill, minmax(320px"] {
    grid-template-columns: 1fr !important;
  }
  /* Image grid in post: keep 2 columns max */
  .post-card div[style*="grid-template-columns: 1fr 1fr"] { gap: 2px !important; }
  /* Status bar: compress further */
  div[style*="bottom: 0"][style*="height: 28px"] { font-size: 10px !important; }
  div[style*="bottom: 0"][style*="height: 28px"] span { padding: 0 8px !important; }
  /* Sub-bars and toolbars: scroll horizontally if too tight */
  div[style*="top: 52px"][style*="height: 44px"] { overflow-x: auto !important; -webkit-overflow-scrolling: touch; }
  div[style*="top: 52px"][style*="height: 40px"] { overflow-x: auto !important; -webkit-overflow-scrolling: touch; }
}
@media (max-width: 420px) {
  /* Very small phones */
  .post-card { padding: 12px !important; }
  .post-card span[style*="position: absolute"][style*="top: 10px"] { display: none !important; } /* hide #post-id corner */
  /* Hide [v0.1.0] entirely on small screens (already in 560 but extra safety) */
  header span[style*="border: 1px solid"][style*="padding: 2px 7px"]:first-child { display: none !important; }
  /* Stat card values stay readable */
  [style*="font-size: 22px"][style*="font-weight: 700"] { font-size: 18px !important; }
}
/* Allow horizontal scroll on tables only, not whole page */
.row { min-width: 0 !important; }

</style>

<body>
<div id="root"></div>
<script type="text/babel" src="myblog-components.jsx"></script>
<script type="text/babel" src="myblog-shared-ui.jsx"></script>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

const MOOD_LIST = ['HAPPY','SAD','EXCITED','THOUGHTFUL','GRATEFUL','ANGRY','CALM'];
const TAG_COLORS = ['#00FFE5','#FF6E96','#BB9AF7','#9ECE6A','#E0AF68','#FF9E64','#7DCFFF'];

function TagBadge({ name, color, onRemove }) {
  return (
    <span style={{ display:'inline-flex', alignItems:'center', gap:'4px', fontFamily:"'JetBrains Mono',monospace", fontSize:'12px', color, background:`${color}15`, border:`1px solid ${color}40`, borderRadius:'4px', padding:'2px 8px', userSelect:'none' }}>
      {name}
      <span onClick={onRemove} style={{ cursor:'pointer', opacity:.7, fontSize:'13px', lineHeight:1, marginLeft:'2px' }}>×</span>
    </span>
  );
}

function ImageThumb({ idx, onRemove }) {
  const cfgs = [{ bg:'#081420', acc:'#00FFE5' },{ bg:'#1A0A1E', acc:'#BB9AF7' },{ bg:'#081A0C', acc:'#9ECE6A' }];
  const c = cfgs[idx % 3];
  return (
    <div style={{ position:'relative', width:'60px', height:'60px', borderRadius:'6px', overflow:'hidden', background:`repeating-linear-gradient(135deg,${c.bg} 0px,${c.bg} 6px,${c.acc}15 6px,${c.acc}15 12px)`, flexShrink:0 }}>
      <button onClick={onRemove} style={{ position:'absolute', top:'2px', right:'2px', background:'rgba(10,14,26,.8)', border:'none', borderRadius:'50%', width:'16px', height:'16px', color:'#F7768E', cursor:'pointer', fontSize:'11px', display:'flex', alignItems:'center', justifyContent:'center', lineHeight:1 }}>×</button>
    </div>
  );
}

function PostPreview({ mood, content, tags, imageCount, files }) {
  const m = MOOD_CFG[mood] || MOOD_CFG.HAPPY;
  const FILE_COLORS = { pdf:'#F7768E', docx:'#7DCFFF', doc:'#7DCFFF', xlsx:'#9ECE6A', xls:'#9ECE6A', txt:'#A0AEC0', csv:'#E0AF68' };

  // Build image grid that matches feed: 1 full, 2 split, 3-4 grid, >4 with +N overlay
  const renderImages = () => {
    if (!imageCount) return null;
    const cfgs = [
      { bg:'#081420', acc:'#00FFE5' },
      { bg:'#1A0A1E', acc:'#BB9AF7' },
      { bg:'#081A0C', acc:'#9ECE6A' },
      { bg:'#1E0C08', acc:'#FF9E64' },
    ];
    const slot = (i) => {
      const c = cfgs[i % 4];
      return <div style={{ width:'100%', height:'100%', background:`repeating-linear-gradient(135deg,${c.bg} 0px,${c.bg} 5px,${c.acc}15 5px,${c.acc}15 10px)` }} />;
    };
    const r = { borderRadius:'4px', overflow:'hidden' };
    if (imageCount === 1)
      return <div style={{ height:'140px', borderRadius:'5px', overflow:'hidden', marginBottom:'10px' }}>{slot(0)}</div>;
    if (imageCount === 2)
      return (
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'3px', height:'110px', borderRadius:'5px', overflow:'hidden', marginBottom:'10px' }}>
          {[0,1].map(i => <div key={i} style={r}>{slot(i)}</div>)}
        </div>
      );
    const shown = Math.min(imageCount, 4);
    return (
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'3px', height:'130px', borderRadius:'5px', overflow:'hidden', marginBottom:'10px' }}>
        <div style={r}>{slot(0)}</div>
        <div style={{ display:'grid', gridTemplateRows:`repeat(${shown-1},1fr)`, gap:'3px' }}>
          {Array.from({ length: shown - 1 }).map((_,i) => (
            <div key={i} style={{ position:'relative', ...r }}>
              {slot(i + 1)}
              {imageCount > 4 && i === shown - 2 && (
                <div style={{ position:'absolute', inset:0, background:'rgba(10,14,26,.78)', display:'flex', alignItems:'center', justifyContent:'center' }}>
                  <span style={{ fontFamily:"'JetBrains Mono',monospace", color:'#E6EDF3', fontSize:'15px', fontWeight:700 }}>+{imageCount - 4}</span>
                </div>
              )}
            </div>
          ))}
        </div>
      </div>
    );
  };
  return (
    <div style={{ background:'#11151F', border:'1px solid rgba(0,255,229,.2)', borderRadius:'8px', padding:'16px', boxShadow:'0 0 20px rgba(0,255,229,.05)' }}>
      <div style={{ display:'flex', alignItems:'flex-start', gap:'10px', marginBottom:'12px' }}>
        <div style={{ width:'34px', height:'34px', borderRadius:'50%', border:'2px solid #00FFE5', background:'linear-gradient(135deg,#00FFE520,#BB9AF720)', display:'flex', alignItems:'center', justifyContent:'center', fontFamily:"'Space Grotesk',sans-serif", fontWeight:700, fontSize:'14px', color:'#00FFE5', flexShrink:0 }}>A</div>
        <div style={{ flex:1 }}>
          <div style={{ display:'flex', alignItems:'center', gap:'6px', marginBottom:'2px' }}>
            <span style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'13px', color:'#7DCFFF' }}>~/admin</span>
            <span style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'10px', color:'#FF9E64', border:'1px solid #FF9E6440', borderRadius:'2px', padding:'0 3px' }}>[ ADMIN ]</span>
          </div>
          <span style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'11px', color:'#8B96AA' }}>just now</span>
        </div>
        <span style={{ display:'inline-flex', alignItems:'center', gap:'4px', background:`${m.color}18`, border:`1px solid ${m.color}50`, borderRadius:'4px', padding:'2px 8px', fontFamily:"'JetBrains Mono',monospace", fontSize:'11px', color:m.color }}>{m.emoji} {m.label}</span>
      </div>
      {content && content.replace(/<[^>]*>/g,'').trim() ? (
        <div className="editor-area" style={{ background:'transparent', border:'none', padding:0, minHeight:0, color:'#C9D1D9', fontSize:'14px', lineHeight:'1.65', marginBottom:'10px', boxShadow:'none' }}
          dangerouslySetInnerHTML={{ __html: content }} />
      ) : (
        <div style={{ color:'#566176', fontFamily:"'JetBrains Mono',monospace", fontSize:'13px', fontStyle:'italic', marginBottom:'10px' }}>// content preview will appear here...</div>
      )}
      {renderImages()}
      {/* File attachments preview */}
      {files && files.length > 0 && (
        <div style={{ marginBottom:'10px' }}>
          <div style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'10px', color:'#8B96AA', marginBottom:'5px', display:'flex', alignItems:'center', gap:'5px' }}>
            <span>// attachments</span><span style={{ color:'#566176' }}>[{files.length}]</span>
          </div>
          <div style={{ display:'flex', flexDirection:'column', gap:'3px' }}>
            {files.slice(0, 4).map((f, i) => {
              const color = FILE_COLORS[f.type] || '#8B96AA';
              return (
                <div key={i} style={{ display:'flex', alignItems:'center', gap:'7px', padding:'5px 9px', background:'#1A1F2E', border:`1px solid ${color}28`, borderRadius:'5px', borderLeft:`2px solid ${color}80` }}>
                  <span style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'9px', color, background:`${color}18`, border:`1px solid ${color}50`, borderRadius:'3px', padding:'1px 4px', flexShrink:0 }}>{f.type.toUpperCase()}</span>
                  <span style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'11px', color:'#C9D1D9', flex:1, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{f.name}</span>
                  <span style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'10px', color:'#8B96AA', flexShrink:0 }}>{f.size}</span>
                </div>
              );
            })}
            {files.length > 4 && (
              <div style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'10px', color:'#566176', textAlign:'center', padding:'4px' }}>+{files.length - 4} more files</div>
            )}
          </div>
        </div>
      )}
      {tags.length > 0 && (
        <div style={{ display:'flex', flexWrap:'wrap', gap:'5px', marginBottom:'10px' }}>
          {tags.map(t => <span key={t.name} style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'11px', color:t.color, background:`${t.color}15`, border:`1px solid ${t.color}40`, borderRadius:'4px', padding:'1px 7px' }}>{t.name}</span>)}
        </div>
      )}
      <div style={{ display:'flex', gap:'2px', paddingTop:'8px', borderTop:'1px solid #1A1F2E' }}>
        {['♡ 0','💬 0','🏷','↗'].map(a => (
          <span key={a} style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'12px', color:'#566176', padding:'4px 8px' }}>{a}</span>
        ))}
      </div>
    </div>
  );
}

function CreatePost() {
  const [mood, setMood]         = useState('HAPPY');
  const [content, setContent]   = useState('');
  const [showTagPicker, setShowTagPicker] = useState(false);
  const [tags, setTags]         = useState([]);
  const [images, setImages]     = useState([]);
  const [fileList, setFileList] = useState([]);
  const [showCP, setShowCP]     = useState(false);
  const [published, setPublished] = useState(false);
  const [showEmoji, setShowEmoji] = useState(false);
  const [showColor, setShowColor] = useState(false);
  const [showHighlight, setShowHighlight] = useState(false);
  const [showAI, setShowAI] = useState(false);
  const [aiPrompt, setAiPrompt] = useState('');
  const [aiResult, setAiResult] = useState('');
  const [aiLoading, setAiLoading] = useState(false);
  const [aiError, setAiError] = useState('');
  const [aiSpinner, setAiSpinner] = useState(0);
  const [linkModal, setLinkModal] = useState(false);
  const [linkText, setLinkText]   = useState('');
  const [linkUrl, setLinkUrl]     = useState('https://');
  const savedSelectionRef = React.useRef(null);
  const editorRef = React.useRef(null);

  // Execute formatting command on contentEditable
  const exec = (cmd, val = null) => {
    editorRef.current?.focus();

    if (sel.rangeCount > 0) savedSelectionRef.current = sel.getRangeAt(0).cloneRange();
  };
  const restoreSelection = () => {
    const r = savedSelectionRef.current;
    if (!r) return;
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(r);
  };

    saveSelection();

    if (hasSel) {

Ý tưởng: ${aiPrompt}`);

                            background:`${t.color}12`, border:`1px solid ${t.color}50`, borderRadius:'4px',
                            padding:'3px 9px', cursor:'pointer', transition:'all .15s' }}
                          onMouseEnter={e => { e.currentTarget.style.background=`${t.color}22`; e.currentTarget.style.boxShadow=`0 0 8px ${t.color}40`; }}
                          onMouseLeave={e => { e.currentTarget.style.background=`${t.color}12`; e.currentTarget.style.boxShadow='none'; }}>
                          + {t.name}
                          <span style={{ color:'#566176', fontSize:'9px' }}>{t.count}</span>
                        </button>
                      ))}
                    </div>
                  )}
                  <div style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'10px', color:'#566176', marginTop:'10px', paddingTop:'8px', borderTop:'1px solid #2A3548' }}>
                    // can't find your tag? <a href="MyBlog Tags.html" style={{ color:'#00FFE5', textDecoration:'none' }}>manage tags →</a>
                  </div>
                </div>
              );
            })()}
          </div>
        </div>

        {/* ── PREVIEW ── */}
        <div className="preview-col" style={{ width:'380px', minWidth:'380px', padding:'20px', overflowY:'auto', background:'#0A0E1A' }}>
          <div className="sb-lbl">// live.preview</div>
          <PostPreview mood={mood} content={content} tags={tags} imageCount={images.length} files={fileList} />
          <div style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'11px', color:'#566176', marginTop:'10px', textAlign:'center' }}>
            // preview updates in real-time
          </div>
        </div>
      </div>

      <StatusBar path="~/admin/create-post" info="● draft · unsaved" />
      {showCP && <CommandPalette onClose={() => setShowCP(false)} />}
      {showAI && (
        <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,.7)', backdropFilter:'blur(6px)', zIndex:400, display:'flex', alignItems:'center', justifyContent:'center', padding:'30px 16px', animation:'fadeUp .15s ease' }}
          onClick={e => e.target===e.currentTarget && !aiLoading && setShowAI(false)}>
          <div style={{ width:'640px', maxWidth:'95vw', maxHeight:'90vh', background:'#11151F', border:'1px solid rgba(187,154,247,.35)', borderRadius:'12px', display:'flex', flexDirection:'column', overflow:'hidden', boxShadow:'0 0 50px rgba(187,154,247,.12),0 24px 60px rgba(0,0,0,.7)' }}>
            <div style={{ padding:'14px 20px', borderBottom:'1px solid #1F2A3A', background:'#0A0E1A', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
              <div>
                <div style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'12px', color:'#BB9AF7' }}>✨ ai.suggest</div>
                <div style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'10px', color:'#566176', marginTop:'2px' }}>~/editor/ai-content-generator</div>
              </div>
              <button onClick={() => !aiLoading && setShowAI(false)} disabled={aiLoading} style={{ background:'none', border:'none', color:'#8B96AA', cursor:aiLoading?'default':'pointer', fontSize:'20px', lineHeight:1 }}>×</button>
            </div>
            <div style={{ flex:1, overflowY:'auto', padding:'18px 20px' }}>
              {/* Prompt input */}
              <label style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'10px', color:'#8B96AA', display:'block', marginBottom:'6px' }}>YOUR IDEA · brief gist</label>
              <textarea value={aiPrompt} onChange={e=>setAiPrompt(e.target.value)}
                placeholder="// vd: chia sẻ ngày deploy thành công sau 3 ngày debug typo trong config..."
                rows={3} disabled={aiLoading}
                style={{ width:'100%', background:'#070A14', border:'1px solid #2A3548', color:'#E6EDF3', fontFamily:"'Inter',sans-serif", fontSize:'13px', padding:'10px 12px', borderRadius:'6px', outline:'none', resize:'vertical', lineHeight:'1.6', marginBottom:'12px' }}
                onFocus={e=>{ e.target.style.borderColor='#BB9AF7'; e.target.style.boxShadow='0 0 10px rgba(187,154,247,.2)'; }}
                onBlur={e=>{ e.target.style.borderColor='#2A3548'; e.target.style.boxShadow='none'; }}
                onKeyDown={e => { if ((e.metaKey||e.ctrlKey) && e.key === 'Enter') runAI(); }} />

              {/* Action buttons */}
              <div style={{ display:'flex', gap:'8px', alignItems:'center', marginBottom:'16px' }}>
                <button onClick={runAI} disabled={aiLoading || !aiPrompt.trim()}
                  style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'12px', fontWeight:600,
                    color: aiLoading||!aiPrompt.trim() ? '#566176' : '#0A0E1A',
                    background: aiLoading||!aiPrompt.trim() ? '#1A1F2E' : '#BB9AF7',
                    border: aiLoading||!aiPrompt.trim() ? '1px solid #2A3548' : 'none',
                    borderRadius:'6px', padding:'8px 18px', cursor: aiLoading||!aiPrompt.trim()?'default':'pointer',
                    boxShadow: aiLoading||!aiPrompt.trim() ? 'none' : '0 0 12px rgba(187,154,247,.4)',
                    display:'inline-flex', alignItems:'center', gap:'6px' }}>
                  {aiLoading ? <>{['⠋','⠙','⠹','⠸','⠼','⠴','⠦','⠧','⠇','⠏'][aiSpinner]} generating...</> : <>{aiResult ? '↻ Regenerate' : '✨ Generate'}</>}
                </button>
                <span style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'10px', color:'#566176' }}>⌘↵ to generate</span>
              </div>

              {/* Error */}
              {aiError && (
                <div style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'11px', color:'#F7768E', background:'rgba(247,118,142,.08)', border:'1px solid rgba(247,118,142,.3)', borderRadius:'5px', padding:'8px 12px', marginBottom:'12px' }}>
                  {aiError}
                </div>
              )}

              {/* Result */}
              {aiResult && (
                <div>
                  <div style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'10px', color:'#BB9AF7', marginBottom:'6px', display:'flex', alignItems:'center', gap:'6px' }}>
                    // ai.result <span style={{ color:'#566176' }}>· ready to apply</span>
                  </div>
                  <div className="editor-area" style={{ background:'#070A14', border:'1px solid rgba(187,154,247,.3)', minHeight:'120px', maxHeight:'280px', overflowY:'auto', fontSize:'14px', color:'#C9D1D9', boxShadow:'0 0 12px rgba(187,154,247,.05)' }}
                    dangerouslySetInnerHTML={{ __html: aiResult }} />
                </div>
              )}

              {!aiResult && !aiLoading && !aiError && (
                <div style={{ textAlign:'center', padding:'30px 20px', fontFamily:"'JetBrains Mono',monospace", color:'#566176' }}>
                  <div style={{ fontSize:'24px', marginBottom:'8px', opacity:.4 }}>✨</div>
                  <div style={{ fontSize:'11px' }}>// nhập ý tưởng và click generate để AI viết bài</div>
                </div>
              )}
            </div>
            {/* Footer */}
            <div style={{ padding:'12px 20px', borderTop:'1px solid #1F2A3A', display:'flex', gap:'8px', background:'#0A0E1A' }}>
              <span style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'10px', color:'#566176', display:'flex', alignItems:'center' }}>
                {aiResult ? '↵ replace editor content with AI result' : '// AI sẽ override toàn bộ editor hiện tại'}
              </span>
              <div style={{ marginLeft:'auto', display:'flex', gap:'8px' }}>
                <button onClick={() => setShowAI(false)} disabled={aiLoading}
                  style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'12px', color:'#8B96AA', background:'#1A1F2E', border:'1px solid #2A3548', borderRadius:'6px', padding:'7px 16px', cursor: aiLoading?'default':'pointer' }}>
                  Cancel
                </button>
                <button onClick={applyAI} disabled={!aiResult || aiLoading}
                  style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'12px', fontWeight:600,
                    color: (!aiResult||aiLoading) ? '#566176' : '#0A0E1A',
                    background: (!aiResult||aiLoading) ? '#1A1F2E' : '#00FFE5',
                    border: (!aiResult||aiLoading) ? '1px solid #2A3548' : 'none',
                    borderRadius:'6px', padding:'7px 18px', cursor:(!aiResult||aiLoading)?'default':'pointer',
                    boxShadow:(!aiResult||aiLoading)?'none':'0 0 12px rgba(0,255,229,.3)' }}>
                  ✓ Replace content
                </button>
              </div>
            </div>
          </div>
        </div>
      )}
      {linkModal && (
        <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,.65)', backdropFilter:'blur(6px)', zIndex:400, display:'flex', alignItems:'center', justifyContent:'center', animation:'fadeUp .15s ease' }}
          onClick={e => e.target===e.currentTarget && setLinkModal(false)}>
          <div style={{ width:'420px', maxWidth:'92vw', background:'#11151F', border:'1px solid rgba(0,255,229,.3)', borderRadius:'10px', overflow:'hidden', boxShadow:'0 0 40px rgba(0,255,229,.1),0 20px 50px rgba(0,0,0,.6)' }}>
            <div style={{ padding:'14px 18px', borderBottom:'1px solid #1F2A3A', background:'#0A0E1A', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
              <div>
                <div style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'12px', color:'#00FFE5' }}>🔗 insert.link</div>
                <div style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'10px', color:'#566176', marginTop:'2px' }}>~/editor/link</div>
              </div>
              <button onClick={() => setLinkModal(false)} style={{ background:'none', border:'none', color:'#8B96AA', cursor:'pointer', fontSize:'20px', lineHeight:1 }}>×</button>
            </div>
            <div style={{ padding:'18px' }}>
              <div style={{ marginBottom:'12px' }}>
                <label style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'10px', color:'#8B96AA', display:'block', marginBottom:'5px' }}>DISPLAY TEXT <span style={{ color:'#566176' }}>(if no selection)</span></label>
                <input value={linkText} onChange={e=>setLinkText(e.target.value)} placeholder="click here..."
                  style={{ width:'100%', background:'#070A14', border:'1px solid #2A3548', color:'#E6EDF3', fontFamily:"'JetBrains Mono',monospace", fontSize:'13px', padding:'8px 12px', borderRadius:'6px', outline:'none' }}
                  onFocus={e=>{ e.target.style.borderColor='#00FFE5'; e.target.style.boxShadow='0 0 10px rgba(0,255,229,.15)'; }}
                  onBlur={e=>{ e.target.style.borderColor='#2A3548'; e.target.style.boxShadow='none'; }} />
              </div>
              <div style={{ marginBottom:'16px' }}>
                <label style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'10px', color:'#8B96AA', display:'block', marginBottom:'5px' }}>URL</label>
                <div style={{ position:'relative' }}>
                  <span style={{ position:'absolute', left:'10px', top:'50%', transform:'translateY(-50%)', color:'#00FFE5', fontSize:'13px', fontFamily:"'JetBrains Mono',monospace", pointerEvents:'none' }}>❯</span>
                  <input value={linkUrl} onChange={e=>setLinkUrl(e.target.value)} autoFocus
                    onKeyDown={e=>{ if(e.key==='Enter') applyLink(); if(e.key==='Escape') setLinkModal(false); }}
                    placeholder="https://"
                    style={{ width:'100%', background:'#070A14', border:'1px solid #2A3548', color:'#E6EDF3', fontFamily:"'JetBrains Mono',monospace", fontSize:'13px', padding:'8px 12px 8px 28px', borderRadius:'6px', outline:'none' }}
                    onFocus={e=>{ e.target.style.borderColor='#00FFE5'; e.target.style.boxShadow='0 0 10px rgba(0,255,229,.15)'; }}
                    onBlur={e=>{ e.target.style.borderColor='#2A3548'; e.target.style.boxShadow='none'; }} />
                </div>
              </div>
              <div style={{ display:'flex', gap:'8px', justifyContent:'flex-end', alignItems:'center' }}>
                <span style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'10px', color:'#566176', marginRight:'auto' }}>↵ insert · Esc cancel</span>
                <button onClick={() => setLinkModal(false)}
                  style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'12px', color:'#8B96AA', background:'#1A1F2E', border:'1px solid #2A3548', borderRadius:'6px', padding:'7px 16px', cursor:'pointer' }}>
                  Cancel
                </button>
                <button onClick={applyLink}
                  style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'12px', fontWeight:600, color:'#0A0E1A', background:'#00FFE5', border:'none', borderRadius:'6px', padding:'7px 18px', cursor:'pointer', boxShadow:'0 0 12px rgba(0,255,229,.3)' }}>
                  ↵ Insert Link
                </button>
              </div>
            </div>
          </div>
        </div>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(CreatePost));
</script>
</body>
</html>
