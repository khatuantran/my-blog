<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>вқҜ_ myblog В· feed</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500&family=JetBrains+Mono:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
/* в”Җв”Җ Variables в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
:root {
  --bg:     #0A0E1A;
  --surf:   #11151F;
  --elev:   #1A1F2E;
  --over:   #232936;
  --b1:     #1F2A3A;
  --b2:     #2A3548;
  --b3:     #3D4A63;
  --tp:     #E6EDF3;
  --ts:     #A0AEC0;
  --tm:     #8B96AA;
  --cyan:   #00FFE5;
  --mag:    #FF6E96;
  --pur:    #BB9AF7;
  --grn:    #9ECE6A;
  --yel:    #E0AF68;
  --ora:    #FF9E64;
  --red:    #F7768E;
  --blu:    #7DCFFF;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  background: var(--bg);
  background-image: radial-gradient(circle, #2A354822 1px, transparent 1px);
  background-size: 24px 24px;
  color: var(--tp);
  font-family: 'Inter', sans-serif;
  overflow-x: hidden;
}
/* CRT scanline */
body::after {
  content: '';
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: repeating-linear-gradient(0deg, transparent 0px, transparent 2px, rgba(0,0,0,0.028) 2px, rgba(0,0,0,0.028) 4px);
  pointer-events: none; z-index: 9999; transition: opacity 0.3s;
}
body.no-crt::after { opacity: 0; }

/* в”Җв”Җ Animations в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
@keyframes blink    { 0%,100%{opacity:1} 50%{opacity:0} }
@keyframes glitch {
  0%,87%,100% { text-shadow:none; transform:none; }
  88% { text-shadow: 2px 0 #FF6E96, -2px 0 #00FFE5; transform:skewX(-2deg) translateX(-2px); }
  90% { text-shadow:-2px 0 #BB9AF7,  2px 0 #FF9E64; transform:skewX(1deg)  translateX(1px);  }
  92% { text-shadow:none; transform:none; }
}
@keyframes pulse    { 0%,100%{opacity:.7;} 50%{opacity:1; filter:drop-shadow(0 0 3px currentColor);} }
@keyframes fadeUp   { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
@keyframes scanLine { from{transform:translateY(-100%)} to{transform:translateY(100vh)} }

/* в”Җв”Җ Scrollbars в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
::-webkit-scrollbar        { width:5px; height:5px; }
::-webkit-scrollbar-track  { background:var(--bg); }
::-webkit-scrollbar-thumb  { background:var(--b2); border-radius:3px; }

/* в”Җв”Җ Section labels в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
.sb-lbl {
  font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--tm);
  letter-spacing:.05em; margin-bottom:8px;
  display:flex; align-items:center; gap:8px;
}
.sb-lbl::after { content:''; flex:1; height:1px; background:var(--b1); }

/* в”Җв”Җ Navigation в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
.nav-item {
  display:flex; align-items:center; gap:8px; padding:5px 4px;
  cursor:pointer; border-radius:4px; color:var(--ts); transition:all .15s; margin-bottom:1px;
}
.nav-item:hover { color:var(--tp); background:var(--elev); }
.nav-act { color:var(--cyan) !important; }

/* в”Җв”Җ Mood rows в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
.mood-hover:hover { background:var(--elev) !important; }

/* в”Җв”Җ Post card в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
.post-card {
  background:var(--surf); border:1px solid var(--b2); border-radius:8px;
  padding:16px 18px; margin-bottom:12px; transition:all .2s; animation:fadeUp .3s ease both;
  position:relative; overflow:hidden;
}
.post-card:hover { border-color:rgba(0,255,229,.45); box-shadow:0 0 24px rgba(0,255,229,.1), 0 4px 24px rgba(0,0,0,.3); }
.post-card.glow-hi:hover { box-shadow:0 0 40px rgba(0,255,229,.22), 0 8px 32px rgba(0,0,0,.4); }
.post-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg,transparent,rgba(0,255,229,.35),transparent);
  opacity:0; transition:opacity .2s;
}
.post-card:hover::before { opacity:1; }

/* в”Җв”Җ Action buttons в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
.act-btn {
  display:flex; align-items:center; gap:4px; padding:5px 10px;
  border-radius:5px; border:none; background:transparent; color:var(--tm);
  cursor:pointer; transition:all .15s; font-family:'JetBrains Mono',monospace; font-size:12px;
}
.act-btn:hover { color:var(--tp); background:var(--elev); }
.act-btn.liked { color:var(--mag); }
.act-btn.saved { color:var(--yel); }

/* в”Җв”Җ Filter buttons в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
.flt-btn {
  font-family:'JetBrains Mono',monospace; font-size:11px;
  padding:5px 12px; border:1px solid var(--b2); border-radius:4px;
  background:var(--elev); color:var(--ts); cursor:pointer; transition:all .15s;
}
.flt-btn:hover { border-color:var(--b3); color:var(--tp); }
.flt-btn.flt-act { border-color:rgba(0,255,229,.5); color:var(--cyan); background:rgba(0,255,229,.08); box-shadow:0 0 8px rgba(0,255,229,.15); }

/* в”Җв”Җ Search в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
.srch-inp {
  width:100%; background:var(--bg); border:1px solid var(--b2); color:var(--ts);
  font-family:'JetBrains Mono',monospace; font-size:13px;
  padding:8px 70px 8px 36px; border-radius:6px; outline:none; transition:all .15s;
}
.srch-inp:focus { border-color:var(--cyan); box-shadow:0 0 14px rgba(0,255,229,.22); color:var(--tp); }
.srch-inp::placeholder { color:var(--tm); font-style:italic; }

/* в”Җв”Җ Command palette items в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
.cp-item { display:flex; align-items:center; gap:10px; padding:8px 16px; cursor:pointer; transition:background .1s; }
.cp-item:hover,.cp-item.cp-sel { background:rgba(0,255,229,.08); }

/* в”Җв”Җ Misc в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
.pulse { animation:pulse 2s ease-in-out infinite; }
.sc-hover:hover { box-shadow:0 0 16px rgba(0,255,229,.12); }
.code-bl {
  font-family:'JetBrains Mono',monospace; font-size:12px; background:#070A14;
  border:1px solid var(--b2); border-left:2px solid rgba(158,206,106,.4);
  border-radius:6px; padding:10px 14px; color:var(--grn); margin:8px 0;
  overflow-x:auto; line-height:1.6; white-space:pre;
}

/* в”Җв”Җ Logo glitch в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
.logo-txt { animation:glitch 9s infinite; display:inline-block; }

/* в”Җв”Җ Responsive в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
@media(max-width:1100px) { .rp { display:none !important; } }
@media(max-width:768px)  { .sb { display:none !important; } .feed-pad { padding:10px 12px !important; } }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="myblog-components.jsx"></script>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// в”Җв”Җ Post content renderer в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function PostContent({ content }) {
  const segs = [];
  let rest = content;
  while (rest.length) {
    const ci = rest.indexOf('```');
    if (ci === -1) { segs.push({ t:'text', v:rest }); break; }
    if (ci > 0) segs.push({ t:'text', v:rest.slice(0, ci) });
    const ce = rest.indexOf('```', ci+3);
    const code = rest.slice(ci+3, ce<0?undefined:ce).replace(/^[a-z]+\n/,'');
    segs.push({ t:'code', v:code });
    rest = ce < 0 ? '' : rest.slice(ce+3);
  }
  return (
    <div style={{ fontSize:'14px', lineHeight:'1.65', color:'#C9D1D9', marginBottom:'12px' }}>
      {segs.map((s,i) =>
        s.t === 'code'
          ? <pre key={i} className="code-bl">{s.v.trim()}</pre>
          : s.v.split('\n\n').map((p,j) =>
              p.trim() ? <p key={`${i}-${j}`} style={{ marginBottom:'8px' }}>{p.trim()}</p> : null
            )
      )}
    </div>
  );
}

// в”Җв”Җ Post Card в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function PostCard({ post, glowLevel, delay }) {
  const [liked, setLiked] = useState(false);
  const [likes, setLikes] = useState(post.likes);
  const [saved, setSaved] = useState(post.saved);
  const mood = MOOD_CFG[post.mood];
  const tagColor = n => TAGS_DATA.find(t => t.name === n)?.color || '#00FFE5';
  const cls = `post-card${glowLevel==='high'?' glow-hi':''}`;

  return (
    <div className={cls} style={{ animationDelay:`${delay||0}ms` }} data-screen-label={`post-${post.id}`}>
      {/* Post ID corner deco */}
      <span style={{ position:'absolute', top:'10px', right:'14px', fontFamily:"'JetBrains Mono',monospace", fontSize:'9px', color:'#2A3548' }}>#{post.id}</span>

      {/* Header */}
      <div style={{ display:'flex', alignItems:'flex-start', gap:'10px', marginBottom:'12px' }}>
        <div style={{ width:'36px', height:'36px', borderRadius:'50%', border:'2px solid #00FFE5',
          background:'linear-gradient(135deg,#00FFE520,#BB9AF720)', display:'flex', alignItems:'center',
          justifyContent:'center', fontFamily:"'Space Grotesk',sans-serif", fontWeight:700,
          fontSize:'14px', color:'#00FFE5', flexShrink:0, boxShadow:'0 0 10px rgba(0,255,229,.2)' }}>
          A
        </div>
        <div style={{ flex:1, minWidth:0 }}>
          <div style={{ display:'flex', alignItems:'center', gap:'6px', marginBottom:'3px', flexWrap:'wrap' }}>
            <span style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'13px', fontWeight:600, color:'#7DCFFF' }}>~/admin</span>
            <span style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'9px', color:'#FF9E64', border:'1px solid #FF9E6450', borderRadius:'2px', padding:'0 4px' }}>[ ADMIN ]</span>
            <span style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'11px', color:'#63707F' }}>В·</span>
            <span style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'11px', color:'#8B96AA' }}>{post.ts}</span>
          </div>
          <div style={{ display:'flex', alignItems:'center', gap:'5px' }}>
            <span style={{ color:'#9ECE6A', fontSize:'8px' }} className="pulse">в—Ҹ</span>
            <span style={{ fontSize:'11px', color:'#8B96AA' }}>{post.time}</span>
          </div>
        </div>
        <MoodBadge mood={post.mood} />
      </div>

      {/* Content */}
      <PostContent content={post.content} />

      {/* Images */}
      <ImageGrid count={post.images} />

      {/* File attachments */}
      <FileAttachments files={post.files} />

      {/* Tags */}
      {post.tags.length > 0 && (
        <div style={{ display:'flex', flexWrap:'wrap', gap:'6px', marginBottom:'12px' }}>
          {post.tags.map(tag => <TagPill key={tag} name={tag} color={tagColor(tag)} />)}
        </div>
      )}

      {/* Divider */}
      <div style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'10px', color:'#1F2A3A', marginBottom:'10px', letterSpacing:'2px', overflow:'hidden', whiteSpace:'nowrap' }}>
        в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
      </div>

      {/* Actions */}
      <div style={{ display:'flex', gap:'2px', alignItems:'center' }}>
        <button className={`act-btn${liked?' liked':''}`}
          onClick={() => { setLiked(!liked); setLikes(liked?likes-1:likes+1); }}
          style={liked?{color:'#FF6E96',textShadow:'0 0 8px #FF6E9660'}:{}}>
          <span style={{ fontSize:'14px' }}>{liked?'вқӨ':'вҷЎ'}</span>
          <span>{likes}</span>
        </button>
        <button className="act-btn">
          <span style={{ fontSize:'14px' }}>рҹ’¬</span>
          <span>{post.comments}</span>
        </button>
        <button className={`act-btn${saved?' saved':''}`} onClick={() => setSaved(!saved)}>
          <span style={{ fontSize:'14px' }}>{saved?'рҹ”–':'рҹҸ·'}</span>
        </button>
        <button className="act-btn">
          <span>вҶ—</span>
          <span>Share</span>
        </button>
        <div style={{ marginLeft:'auto' }}>
          <button className="act-btn">вӢҜ</button>
        </div>
      </div>
    </div>
  );
}

// в”Җв”Җ Filter Bar в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function FilterBar({ activeMood, onMoodFilter }) {
  const moodFilters = ['HAPPY','EXCITED','THOUGHTFUL','CALM','SAD'];
  return (
    <div style={{ marginBottom:'16px' }}>

// в”Җв”Җ ASCII Spinner в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function AsciiSpinner() {
  const frames = ['в Ӣ','в ҷ','в №','в ё','в ј','в ҙ','в Ұ','в §','в Ү','в Ҹ'];
  const [f, setF] = useState(0);
  useEffect(() => { const iv = setInterval(() => setF(n => (n+1)%frames.length), 80); return () => clearInterval(iv); }, []);
  return <span>{frames[f]}</span>;
}

// в”Җв”Җ Feed в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function Feed({ activeMood, onMoodFilter, glowLevel }) {
  const allPosts = activeMood ? POSTS_DATA.filter(p => p.mood === activeMood) : POSTS_DATA;
  const [shown, setShown] = useState(2);
  const [loading, setLoading] = useState(false);
  const sentinelRef = useRef(null);
  const hasMore = shown < allPosts.length;

  useEffect(() => { setShown(2); }, [activeMood]);

  useEffect(() => {
    if (!sentinelRef.current) return;
    const obs = new IntersectionObserver(entries => {
      if (entries[0].isIntersecting && hasMore && !loading) {
        setLoading(true);
        setTimeout(() => { setShown(s => Math.min(s + 2, allPosts.length)); setLoading(false); }, 700);
      }
    }, { rootMargin: '120px' });
    obs.observe(sentinelRef.current);
    return () => obs.disconnect();
  }, [hasMore, loading, allPosts.length]);

  const visible = allPosts.slice(0, shown);
  return (
    <main style={{ flex:1, padding:'16px 24px', minWidth:0 }} className="feed-pad">
      <div style={{ maxWidth:'820px', margin:'0 auto' }}>
      <FilterBar activeMood={activeMood} onMoodFilter={onMoodFilter} />
      {visible.length === 0
        ? (
          <div style={{ textAlign:'center', padding:'60px 20px', fontFamily:"'JetBrains Mono',monospace" }}>
            <div style={{ fontSize:'40px', marginBottom:'12px', opacity:.3 }}>в—җ</div>
            <div style={{ color:'#8B96AA', marginBottom:'6px' }}>// no posts matching filter</div>
            <div style={{ color:'#566176', fontSize:'11px' }}>$ cd ../feed && ls -la --all-moods</div>
          </div>
        )
        : visible.map((p, i) => <PostCard key={p.id} post={p} glowLevel={glowLevel} delay={i * 60} />)
      }
      {/* Sentinel */}
      <div ref={sentinelRef} style={{ padding:'20px 0', display:'flex', justifyContent:'center', alignItems:'center', minHeight:'40px' }}>
        {loading && (
          <span style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'12px', color:'#8B96AA', display:'flex', alignItems:'center', gap:'8px' }}>
            <AsciiSpinner /> loading posts...
          </span>
        )}
        {!hasMore && visible.length > 0 && (
          <span style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'11px', color:'#566176' }}>
            // end of feed В· {allPosts.length} posts loaded
          </span>
        )}
      </div>
      </div>
    </main>
  );
}

  );
}

// в”Җв”Җ App в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function App() {
  const [activeMood, setActiveMood] = useState(null);
  const [showCP, setShowCP] = useState(false);
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
  const [showTweaks, setShowTweaks] = useState(false);

  useEffect(() => {
    const h = e => {
      if (e.data?.type === '__activate_edit_mode')   setShowTweaks(true);
      if (e.data?.type === '__deactivate_edit_mode') setShowTweaks(false);
    };
    window.addEventListener('message', h);
    window.parent.postMessage({ type:'__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', h);
  }, []);

  useEffect(() => {
    const h = e => {
      if ((e.metaKey||e.ctrlKey) && e.key==='k') { e.preventDefault(); setShowCP(c=>!c); }
    };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, []);

  useEffect(() => {
    document.body.classList.toggle('no-crt', !tweaks.crtEffect);
  }, [tweaks.crtEffect]);

  const setTweak = (key, val) => {
    const u = { ...tweaks, [key]:val };
    setTweaks(u);
    window.parent.postMessage({ type:'__edit_mode_set_keys', edits:{ [key]:val } }, '*');
  };

  return (
    <>
      <TopBar onOpenCP={() => setShowCP(true)} />
      <div style={{ display:'flex', marginTop:'52px', minHeight:'calc(100vh - 52px - 28px)', paddingBottom:'28px' }}>
        <Feed activeMood={activeMood} onMoodFilter={setActiveMood} glowLevel={tweaks.glowIntensity} />
      </div>
      <StatusBar />
      {showCP && <CommandPalette onClose={() => setShowCP(false)} />}
      {showTweaks && (
        <TweaksPanelInline tweaks={tweaks} setTweak={setTweak}
          onClose={() => { setShowTweaks(false); window.parent.postMessage({ type:'__edit_mode_dismissed' }, '*'); }} />
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
