<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>kha.blog · ~/auth/login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=JetBrains+Mono:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
html,body { height:100%; }
body {
  background:#0A0E1A;
  background-image: radial-gradient(circle, #2A354822 1px, transparent 1px);
  background-size:24px 24px;
  color:#E6EDF3; font-family:'JetBrains Mono',monospace;
  display:flex; align-items:center; justify-content:center; min-height:100vh;
}
body::after {
  content:''; position:fixed; top:0; left:0; right:0; bottom:0;
  background:repeating-linear-gradient(0deg,transparent 0px,transparent 2px,rgba(0,0,0,.028) 2px,rgba(0,0,0,.028) 4px);
  pointer-events:none; z-index:9999;
}
@keyframes scanCard { 0%{top:-100%} 100%{top:200%} }
@keyframes blink    { 0%,100%{opacity:1} 50%{opacity:0} }
@keyframes fadeUp   { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }
@keyframes shake    { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-5px)} 40%,80%{transform:translateX(5px)} }
@keyframes pulse    { 0%,100%{opacity:.7} 50%{opacity:1;filter:drop-shadow(0 0 3px currentColor)} }
.pulse { animation:pulse 2s ease-in-out infinite; }
.inp {
  width:100%; background:#070A14; border:1px solid #2A3548; color:#E6EDF3;
  font-family:'JetBrains Mono',monospace; font-size:15px;
  padding:10px 12px 10px 32px; border-radius:6px; outline:none; transition:all .15s;
}
.inp:focus { border-color:#00FFE5; box-shadow:0 0 14px rgba(0,255,229,.2); }
.inp::placeholder { color:#8B96AA; }
.btn-primary {
  width:100%; font-family:'JetBrains Mono',monospace; font-size:14px; font-weight:600;
  color:#00FFE5; background:rgba(0,255,229,.08); border:1px solid rgba(0,255,229,.4);
  border-radius:6px; padding:11px; cursor:pointer; transition:all .15s;
  box-shadow:0 0 12px rgba(0,255,229,.12);
}
.btn-primary:hover { background:rgba(0,255,229,.14); box-shadow:0 0 20px rgba(0,255,229,.2); }
.btn-primary:disabled { color:#8B96AA; background:#1A1F2E; border-color:#2A3548; box-shadow:none; cursor:default; }

/* Post-bump fixes — keep small UI badges/pills/labels on one line */
span[style*="JetBrains Mono"], span[style*="JetBrains Mono,monospace"] { white-space: nowrap; }
/* Mood badges, filter chips, stat deltas — inline-flex content must not wrap */
[style*="inline-flex"][style*="JetBrains Mono"] { flex-shrink: 0; white-space: nowrap; }
/* Bracket badges like [ ADMIN ], [ v0.1.0 ] */
.flt-btn, .sort-btn, .filter-chip, .act-btn, .skill-badge, .tab-btn, .act-ghost { white-space: nowrap; flex-shrink: 0; }


/* Post-bump nowrap fixes v2 — broader, with restored wrap containers */
[style*="JetBrains"] { white-space: nowrap; }
.sb-lbl, .sb-lbl > *, .glitch { white-space: nowrap !important; }
/* Restore wrap-sensitive containers */
.code-bl, pre.code-bl { white-space: pre !important; }
.editor-area, .comment-inp, textarea { white-space: pre-wrap !important; }
.sb-lbl::after { white-space: normal !important; }


/* Mobile topbar — hide search to prevent overlap with logo/avatar */
@media (max-width: 820px) {
  header > div[style*="position: absolute"] { display: none !important; }
}
@media (max-width: 560px) {
  /* Hide version badge + online count on very small screens */
  header > div[style*="margin-left: auto"] > span:nth-child(1),
  header > div[style*="margin-left: auto"] > span:nth-child(2) { display: none !important; }
  /* Compact logo subtitle */
  header [style*="personal"] { display: none !important; }
}


/* ==== Mobile responsive v2 — real adaptive layout ==== */
@media (max-width: 980px) {
  /* Stack 4-col stat grids → 2 cols */
  [style*="grid-template-columns: repeat(4"],
  [style*="grid-template-columns:repeat(4"] {
    grid-template-columns: repeat(2, 1fr) !important;
  }
  /* Sub-bar items wrap */
  div[style*="height: 44px"][style*="border-bottom"] { flex-wrap: wrap !important; height: auto !important; padding-top: 8px !important; padding-bottom: 8px !important; row-gap: 6px !important; }
  /* Topbar nav: tighten */
  header { padding-left: 12px !important; padding-right: 12px !important; }
}
@media (max-width: 760px) {
  /* Main padding compression */
  main, [style*="padding: 20px 24px"], [style*="padding:'20px 24px'"] { padding-left: 14px !important; padding-right: 14px !important; }
  /* Tables with many cols → horizontal scroll instead of breaking */
  [style*="grid-template-columns: 3fr"],
  [style*="grid-template-columns: 2fr"] { min-width: 720px !important; }
  /* Wrap their containers so they scroll instead of overlap */
  div[style*="border-radius: 8px"][style*="overflow: hidden"]:has([style*="grid-template-columns: 3fr"]),
  div[style*="border-radius: 8px"][style*="overflow: hidden"]:has([style*="grid-template-columns: 2fr"]) {
    overflow-x: auto !important;
  }
  /* Stat cards smaller */
  [style*="font-size: 22px"][style*="font-weight: 700"],
  [style*="font-size:22px"] { font-size: 18px !important; }
  /* Hero on Profile: stack and shrink */
  .profile-hero { flex-direction: column !important; align-items: flex-start !important; gap: 12px !important; }
  /* Modal full-bleed-ish */
  [style*="width: 640px"], [style*="width: 560px"], [style*="width: 540px"], [style*="width: 480px"], [style*="width: 440px"], [style*="width: 420px"], [style*="width: 400px"], [style*="width: 380px"], [style*="width: 360px"] {
    width: calc(100vw - 24px) !important;
    max-width: calc(100vw - 24px) !important;
  }
  /* Right drawer (profile settings) full-width */
  [style*="width: 480px"][style*="height: 100vh"] { width: 100vw !important; }
  /* Hide Create Post preview column already gone via .preview-col */
  /* Big heading shrink */
  h1[style*="font-size: 26px"] { font-size: 22px !important; }
}
@media (max-width: 480px) {
  /* 2-col grids → 1 col */
  [style*="grid-template-columns: repeat(2"],
  [style*="grid-template-columns:repeat(2"] {
    grid-template-columns: 1fr !important;
  }
  /* Even tighter padding */
  main, [style*="padding: 24px 28px"], [style*="padding:'24px 28px'"] { padding-left: 12px !important; padding-right: 12px !important; }
  /* Login card padding */
  [style*="padding: 22px 20px"] { padding: 16px !important; }
  /* Status bar info — hide some segments */
  div[style*="bottom: 0"][style*="height: 28px"] span:nth-of-type(n+3) { display: none !important; }
}
/* Touch-friendly tap targets globally on mobile */
@media (max-width: 760px) and (pointer: coarse) {
  button, .toolbar-btn, .filter-chip, .sort-btn, .act-btn { min-height: 36px !important; }
}


/* ==== Mobile responsive v3 — prevent overflow + tight layout ==== */
html, body { max-width: 100vw; overflow-x: hidden; }
@media (max-width: 640px) {
  /* Topbar: bring right cluster fully inside viewport */
  header { padding-left: 10px !important; padding-right: 10px !important; gap: 0 !important; }
  header > div[style*="margin-left: auto"] { gap: 6px !important; }
  /* Logo: drop subtitle for sure, shrink */
  header svg { width: 20px !important; height: 20px !important; }
  /* Notification dropdown: full width near viewport */
  header [style*="width: 380px"] { width: calc(100vw - 20px) !important; right: -8px !important; }
  /* Avatar dropdown menu */
  header [style*="min-width: 210px"] { right: -4px !important; }
  /* Feed filter row: don't push 'Latest' off-screen with margin-left:auto */
  .flt-btn[style*="margin-left: auto"], button[style*="margin-left: auto"][style*="Latest"] {
    margin-left: 0 !important;
  }
  /* Common pattern: anything with margin-left:auto in a flex row at mobile becomes wrap-friendly */
  div[style*="display: flex"][style*="flex-wrap: wrap"] > [style*="margin-left: auto"] {
    margin-left: 0 !important;
  }
  /* Post cards: tighter padding */
  .post-card { padding: 14px !important; }
  /* Tags page card grid */
  div[style*="grid-template-columns: repeat(auto-fill, minmax(240px"] {
    grid-template-columns: 1fr !important;
  }
  div[style*="grid-template-columns: repeat(auto-fill, minmax(320px"] {
    grid-template-columns: 1fr !important;
  }
  /* Image grid in post: keep 2 columns max */
  .post-card div[style*="grid-template-columns: 1fr 1fr"] { gap: 2px !important; }
  /* Status bar: compress further */
  div[style*="bottom: 0"][style*="height: 28px"] { font-size: 10px !important; }
  div[style*="bottom: 0"][style*="height: 28px"] span { padding: 0 8px !important; }
  /* Sub-bars and toolbars: scroll horizontally if too tight */
  div[style*="top: 52px"][style*="height: 44px"] { overflow-x: auto !important; -webkit-overflow-scrolling: touch; }
  div[style*="top: 52px"][style*="height: 40px"] { overflow-x: auto !important; -webkit-overflow-scrolling: touch; }
}
@media (max-width: 420px) {
  /* Very small phones */
  .post-card { padding: 12px !important; }
  .post-card span[style*="position: absolute"][style*="top: 10px"] { display: none !important; } /* hide #post-id corner */
  /* Hide [v0.1.0] entirely on small screens (already in 560 but extra safety) */
  header span[style*="border: 1px solid"][style*="padding: 2px 7px"]:first-child { display: none !important; }
  /* Stat card values stay readable */
  [style*="font-size: 22px"][style*="font-weight: 700"] { font-size: 18px !important; }
}
/* Allow horizontal scroll on tables only, not whole page */
.row { min-width: 0 !important; }

</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;
const SPIN = ['⠋','⠙','⠹','⠸','⠼','⠴','⠦','⠧','⠇','⠏'];

function Login() {
  const [user, setUser]       = useState('');
  const [pass, setPass]       = useState('');
  const [showPw, setShowPw]   = useState(false);
  const [loading, setLoading] = useState(false);
  const [error, setError]     = useState('');
  const [frame, setFrame]     = useState(0);
  const [blink, setBlink]     = useState(true);
  const [shaking, setShaking] = useState(false);

  useEffect(() => { const iv = setInterval(() => setBlink(b=>!b), 530); return () => clearInterval(iv); }, []);
  useEffect(() => {
    if (!loading) return;
    const iv = setInterval(() => setFrame(f=>(f+1)%SPIN.length), 80);
    return () => clearInterval(iv);
  }, [loading]);

  const fail = msg => {
    setLoading(false); setError(msg);
    setShaking(true); setTimeout(() => setShaking(false), 450);
  };

  const submit = e => {
    e.preventDefault();
    if (!user.trim() || !pass) return fail('[ERROR] all fields required');
    setError(''); setLoading(true);
    setTimeout(() => {
      if (user === 'admin' && pass === 'admin') window.location.href = 'MyBlog Feed.html';
      else fail('[ERROR] invalid credentials · hint: admin / admin');
    }, 1800);
  };

  return (
    <div style={{ width:'100%', maxWidth:'420px', padding:'20px', animation:'fadeUp .35s ease' }}>

      {/* Card */}
      <div style={{ background:'#11151F', border:'1px solid #2A3548', borderRadius:'12px', overflow:'hidden',
        boxShadow:'0 0 50px rgba(0,255,229,.07),0 20px 60px rgba(0,0,0,.55)',
        animation:shaking?'shake .4s ease':undefined, position:'relative' }}>

        {/* Moving scan line */}
        <div style={{ position:'absolute', left:0, right:0, height:'2px', background:'linear-gradient(90deg,transparent,rgba(0,255,229,.18),transparent)', animation:'scanCard 4s linear infinite', zIndex:2, pointerEvents:'none' }} />

        {/* Terminal header */}
        <div style={{ background:'#0A0E1A', borderBottom:'1px solid #1F2A3A', padding:'14px 18px' }}>
          <div style={{ display:'flex', alignItems:'center', gap:'8px', marginBottom:'6px' }}>
            <svg width="16" height="16" viewBox="0 0 24 24"><polyline points="8,3 3,12 8,21" stroke="#00FFE5" strokeWidth="2.5" fill="none" strokeLinecap="round"/><polyline points="16,3 21,12 16,21" stroke="#BB9AF7" strokeWidth="2.5" fill="none" strokeLinecap="round"/></svg>
            <span style={{ fontFamily:"'Space Grotesk',sans-serif", fontWeight:700, fontSize:'15px', letterSpacing:'-0.03em' }}>
              <span style={{ color:'#E6EDF3' }}>kha</span><span style={{ color:'#00FFE5' }}>.</span><span style={{ color:'#A0AEC0', fontWeight:500 }}>blog</span>
            </span>
            <span style={{ fontSize:'11px', color:'#566176', marginLeft:'4px' }}>v0.1.0</span>
          </div>
          <div style={{ fontSize:'13px', color:'#8B96AA' }}>
            ~/auth/login<span style={{ color:'#00FFE5', opacity:blink?1:0 }}>_</span>
          </div>
        </div>

        {/* Form */}
        <form onSubmit={submit} style={{ padding:'22px 20px 26px' }}>
          <div style={{ fontSize:'11px', color:'#8B96AA', marginBottom:'18px' }}>// authenticate to continue</div>

          {/* Username */}
          <div style={{ marginBottom:'14px' }}>
            <div style={{ fontSize:'11px', color:'#8B96AA', marginBottom:'6px' }}>username</div>
            <div style={{ position:'relative' }}>
              <span style={{ position:'absolute', left:'10px', top:'50%', transform:'translateY(-50%)', color:'#00FFE5', fontSize:'13px' }}>❯</span>
              <input className="inp" type="text" value={user} onChange={e=>setUser(e.target.value)} placeholder="enter username..." autoComplete="username" autoFocus />
            </div>
          </div>

          {/* Password */}
          <div style={{ marginBottom:'20px' }}>
            <div style={{ fontSize:'11px', color:'#8B96AA', marginBottom:'6px' }}>password</div>
            <div style={{ position:'relative' }}>
              <span style={{ position:'absolute', left:'10px', top:'50%', transform:'translateY(-50%)', color:'#00FFE5', fontSize:'13px' }}>❯</span>
              <input className="inp" type={showPw?'text':'password'} value={pass} onChange={e=>setPass(e.target.value)} placeholder="enter password..." style={{ paddingRight:'42px' }} />
              <button type="button" onClick={() => setShowPw(!showPw)}
                style={{ position:'absolute', right:'10px', top:'50%', transform:'translateY(-50%)', background:'none', border:'none', color:'#8B96AA', cursor:'pointer', fontSize:'14px', lineHeight:1 }}>
                {showPw ? '🙈' : '👁'}
              </button>
            </div>
          </div>

          {/* Error */}
          {error && (
            <div style={{ fontSize:'13px', color:'#F7768E', marginBottom:'14px', padding:'8px 12px', background:'rgba(247,118,142,.08)', border:'1px solid rgba(247,118,142,.3)', borderRadius:'5px' }}>
              {error}
            </div>
          )}

          {/* Submit */}
          <button type="submit" className="btn-primary" disabled={loading}>
            {loading ? `[ ${SPIN[frame]} AUTHENTICATING... ]` : '[ AUTHENTICATE ↵ ]'}
          </button>

          {/* Divider */}
          <div style={{ display:'flex', alignItems:'center', gap:'10px', margin:'18px 0 14px' }}>
            <div style={{ flex:1, height:'1px', background:'#1F2A3A' }} />
            <span style={{ fontSize:'11px', color:'#566176' }}>── or ──</span>
            <div style={{ flex:1, height:'1px', background:'#1F2A3A' }} />
          </div>

          {/* Anonymous */}
          <a href="MyBlog Feed.html" style={{ display:'block', textAlign:'center', textDecoration:'none', fontSize:'13px', color:'#BB9AF7', padding:'9px', borderRadius:'6px', border:'1px solid rgba(187,154,247,.2)', background:'rgba(187,154,247,.05)', transition:'all .15s' }}>
            Continue as anonymous →
          </a>

          {/* Register link */}
          <div style={{ marginTop:'16px', textAlign:'center', fontSize:'12px', color:'#566176' }}>
            // no account? <a href="#" style={{ color:'#7DCFFF', textDecoration:'none' }}>❯ register here</a>
          </div>
        </form>
      </div>

      {/* Bottom mini status */}
      <div style={{ display:'flex', justifyContent:'space-between', marginTop:'14px', fontSize:'11px', color:'#566176' }}>
        <span><span className="pulse" style={{ color:'#9ECE6A', fontSize:'7px' }}>●</span> connected to server</span>
        <span>build: a1b2c3</span>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(Login));
</script>
</body>
</html>
