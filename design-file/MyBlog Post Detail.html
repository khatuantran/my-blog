<style>

/* Post-bump fixes — keep small UI badges/pills/labels on one line */
span[style*="JetBrains Mono"], span[style*="JetBrains Mono,monospace"] { white-space: nowrap; }
/* Mood badges, filter chips, stat deltas — inline-flex content must not wrap */

/* Post-bump nowrap fixes v2 — broader, with restored wrap containers */

/* Mobile topbar — hide search to prevent overlap with logo/avatar */
@media (max-width: 820px) {
  header > div[style*="position: absolute"] { display: none !important; }
}
@media (max-width: 560px) {

/* ==== Mobile responsive v2 — real adaptive layout ==== */
@media (max-width: 980px) {

  /* Topbar nav: tighten */

}
@media (max-width: 760px) {
  /* Main padding compression */
  main, [style*="padding: 20px 24px"], [style*="padding:'20px 24px'"] { padding-left: 14px !important; padding-right: 14px !important; }
  /* Tables with many cols → horizontal scroll instead of breaking */
  [style*="grid-template-columns: 3fr"],

  div[style*="border-radius: 8px"][style*="overflow: hidden"]:has([style*="grid-template-columns: 3fr"]),
  div[style*="border-radius: 8px"][style*="overflow: hidden"]:has([style*="grid-template-columns: 2fr"]) {

  [style*="width: 640px"], [style*="width: 560px"], [style*="width: 540px"], [style*="width: 480px"], [style*="width: 440px"], [style*="width: 420px"], [style*="width: 400px"], [style*="width: 380px"], [style*="width: 360px"] {

  /* Big heading shrink */

@media (max-width: 480px) {

@media (max-width: 760px) and (pointer: coarse) {

/* ==== Mobile responsive v3 — prevent overflow + tight layout ==== */
html, body { max-width: 100vw; overflow-x: hidden; }
@media (max-width: 640px) {
  /* Topbar: bring right cluster fully inside viewport */
  header { padding-left: 10px !important; padding-right: 10px !important; gap: 0 !important; }
  header > div[style*="margin-left: auto"] { gap: 6px !important; }
  /* Logo: drop subtitle for sure, shrink */
  header svg { width: 20px !important; height: 20px !important; }
  /* Notification dropdown: full width near viewport */
  header [style*="width: 380px"] { width: calc(100vw - 20px) !important; right: -8px !important; }
  /* Avatar dropdown menu */
  header [style*="min-width: 210px"] { right: -4px !important; }

  .flt-btn[style*="margin-left: auto"], button[style*="margin-left: auto"][style*="Latest"] {

  }

  div[style*="display: flex"][style*="flex-wrap: wrap"] > [style*="margin-left: auto"] {
    margin-left: 0 !important;
  }
  /* Post cards: tighter padding */
  .post-card { padding: 14px !important; }

  /* Status bar: compress further */

  div[style*="bottom: 0"][style*="height: 28px"] span { padding: 0 8px !important; }
  /* Sub-bars and toolbars: scroll horizontally if too tight */
  div[style*="top: 52px"][style*="height: 44px"] { overflow-x: auto !important; -webkit-overflow-scrolling: touch; }
  div[style*="top: 52px"][style*="height: 40px"] { overflow-x: auto !important; -webkit-overflow-scrolling: touch; }
}
@media (max-width: 420px) {
  /* Very small phones */

}
/* Allow horizontal scroll on tables only, not whole page */
.row { min-width: 0 !important; }

<script type="text/babel" src="myblog-components.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

const POST = {
  id:'abc123', ts:'[2026-05-17 12:30]', time:'2h ago', mood:'HAPPY',
  content:`Hôm nay deploy xong feature mới sau 3 ngày debug liên tục. Cái bug khó chịu nhất hóa ra chỉ là một dòng typo trong config file — đau lòng hơn là đã mất 3 ngày để tìm ra 😅\n\nĐây là đoạn code lỗi:\n\`\`\`js\n// Bug: sai tên biến env\nconst secret = process.env.AUTH_SERCET; // typo!\n\n// Fix: \nconst secret = process.env.AUTH_SECRET; // correct\n\`\`\`\n\nLesson learned quan trọng:\n- Luôn double-check tên biến environment\n- Viết test cho auth flow ngay từ đầu\n- Đừng debug lúc 2 giờ sáng 😂\n\nNhưng cảm giác sau khi fix được bug stubborn nhất project — không có gì sánh được. Feature giờ đã live trên prod!`,
  images:4, tags:['#code','#dev','#debugging','#nodejs'], likes:24, comments:5, views:142, saved:false,
};

const COMMENTS = [
  { id:1, user:'@user1', text:'Relatable quá! Mình cũng từng mất 2 ngày vì một typo tương tự 😭', time:'1h ago', likes:3, isAnon:false },
  { id:2, user:'Anon#7', text:'Cảm ơn bạn đã chia sẻ! AUTH_SERCET vs AUTH_SECRET — classic mistake 😄', time:'45m ago', likes:1, isAnon:true },
  { id:3, user:'@user2', text:'Tip nhỏ: dùng `dotenv-safe` để validate env vars khi start app, sẽ catch lỗi này ngay lập tức.', time:'20m ago', likes:5, isAnon:false },
];

function PostContent({ content }) {
  const segs = [];
  let rest = content;
  while (rest.length) {
    const ci = rest.indexOf('```');
    if (ci === -1) { segs.push({ t:'text', v:rest }); break; }
    if (ci > 0) segs.push({ t:'text', v:rest.slice(0, ci) });
    const ce = rest.indexOf('```', ci+3);
    segs.push({ t:'code', v:rest.slice(ci+3, ce<0?undefined:ce).replace(/^[a-z]+\n/,'') });
    rest = ce<0?'':rest.slice(ce+3);
  }
  return (
    <div style={{ fontSize:'16px', lineHeight:'1.75', color:'#C9D1D9' }}>
      {segs.map((s,i) => s.t==='code'
        ? <pre key={i} style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'14px', background:'#070A14', border:'1px solid #2A3548', borderLeft:'2px solid rgba(158,206,106,.5)', borderRadius:'6px', padding:'12px 16px', color:'#9ECE6A', margin:'14px 0', overflowX:'auto', lineHeight:'1.6', whiteSpace:'pre' }}>{s.v.trim()}</pre>
        : s.v.split('\n\n').map((p,j) => p.trim() ? <p key={`${i}-${j}`} style={{ marginBottom:'12px' }}>{p.trim()}</p> : null)
      )}
    </div>
  );
}

function ImageCarousel({ count }) {
  const [cur, setCur] = useState(0);
  if (!count) return null;
  const cfgs = [
    { bg:'#081420', acc:'#00FFE5', lbl:'deploy screenshot' },
    { bg:'#1A0A1E', acc:'#BB9AF7', lbl:'terminal output' },
    { bg:'#081A0C', acc:'#9ECE6A', lbl:'git diff view' },
    { bg:'#1E0C08', acc:'#FF9E64', lbl:'prod dashboard' },
  ];
  const c = cfgs[cur % cfgs.length];
  return (
    <div style={{ marginBottom:'20px' }}>
      <div style={{ position:'relative', height:'280px', borderRadius:'8px', overflow:'hidden', background:`repeating-linear-gradient(135deg,${c.bg} 0px,${c.bg} 7px,${c.acc}10 7px,${c.acc}10 14px)` }}>
        <div style={{ position:'absolute', inset:0, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:'8px' }}>
          <span style={{ fontSize:'28px', opacity:.3 }}>⬡</span>
          <span style={{ fontFamily:"'JetBrains Mono',monospace", color:c.acc, opacity:.5, fontSize:'12px' }}>{c.lbl}</span>
        </div>
        {cur > 0 && <button onClick={() => setCur(cur-1)} style={{ position:'absolute', left:'12px', top:'50%', transform:'translateY(-50%)', background:'rgba(10,14,26,.75)', border:'1px solid #2A3548', borderRadius:'6px', color:'#E6EDF3', cursor:'pointer', padding:'6px 10px', fontSize:'15px', backdropFilter:'blur(4px)' }}>←</button>}
        {cur < count-1 && <button onClick={() => setCur(cur+1)} style={{ position:'absolute', right:'12px', top:'50%', transform:'translateY(-50%)', background:'rgba(10,14,26,.75)', border:'1px solid #2A3548', borderRadius:'6px', color:'#E6EDF3', cursor:'pointer', padding:'6px 10px', fontSize:'15px', backdropFilter:'blur(4px)' }}>→</button>}
        <div style={{ position:'absolute', bottom:'10px', left:'50%', transform:'translateX(-50%)', display:'flex', gap:'5px' }}>
          {Array.from({length:count}).map((_,i) => (
            <div key={i} onClick={() => setCur(i)} style={{ width:i===cur?'16px':'6px', height:'6px', borderRadius:'3px', background:i===cur?'#00FFE5':'#2A3548', cursor:'pointer', transition:'all .2s', boxShadow:i===cur?'0 0 6px #00FFE5':undefined }} />
          ))}
        </div>
      </div>
      <div style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'11px', color:'#8B96AA', marginTop:'6px', textAlign:'right' }}>{cur+1}/{count}</div>
    </div>
  );
}

function CommentItem({ c }) {
  const [liked, setLiked] = useState(false);
  const [likes, setLikes] = useState(c.likes);
  return (
    <div style={{ padding:'14px 0', borderBottom:'1px solid #1F2A3A' }}>
      <div style={{ display:'flex', alignItems:'center', gap:'8px', marginBottom:'8px' }}>
        <div style={{ width:'28px', height:'28px', borderRadius:'50%', border:'1.5px solid #2A3548', background: c.isAnon?'#1A1F2E':'linear-gradient(135deg,#00FFE520,#BB9AF720)', display:'flex', alignItems:'center', justifyContent:'center', fontFamily:"'JetBrains Mono',monospace", fontSize:'11px', color: c.isAnon?'#8B96AA':'#00FFE5', flexShrink:0 }}>
          {c.isAnon ? '?' : c.user[1].toUpperCase()}
        </div>
        <div>
          <span style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'13px', color: c.isAnon?'#8B96AA':'#7DCFFF' }}>{c.user}</span>
          {c.isAnon && <span style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'10px', color:'#566176', marginLeft:'6px' }}>[ anon ]</span>}
          <span style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'11px', color:'#566176', marginLeft:'8px' }}>{c.time}</span>
        </div>
      </div>
      <p style={{ fontSize:'15px', color:'#C9D1D9', lineHeight:'1.65', marginBottom:'8px', marginLeft:'36px' }}>{c.text}</p>
      <div style={{ marginLeft:'36px', display:'flex', gap:'4px' }}>
        <button className={`act-btn${liked?' liked':''}`} onClick={() => { setLiked(!liked); setLikes(liked?likes-1:likes+1); }}>
          <span>{liked?'❤':'♡'}</span><span>{likes}</span>
        </button>
        <button className="act-btn">↩ Reply</button>
      </div>
    </div>
  );
}

// ── Reactions (synced with Feed) ────────────────────────────────────
const REACTIONS = [
  { key:'like',  label:'Like',  color:'#7DCFFF', svg:(c)=>(<><rect x="3" y="11" width="4" height="9" stroke={c} strokeWidth="1.6" fill="none"/><path d="M7 11l4-7c2 0 2.5 1.5 2 3l-1 2h5.5c1.5 0 2.5 1.5 2 3l-1.5 5.5c-.3 1.2-1.3 1.5-2.3 1.5H7" fill="none" stroke={c} strokeWidth="1.6" strokeLinejoin="round"/><line x1="4" y1="15" x2="6" y2="15" stroke={c} strokeWidth="1.2"/></>) },
  { key:'love',  label:'Love',  color:'#FF6E96', svg:(c)=>(<path d="M12 20s-7-4.5-7-10a4 4 0 0 1 7-2.5A4 4 0 0 1 19 10c0 5.5-7 10-7 10z" fill="none" stroke={c} strokeWidth="1.8" strokeLinejoin="round"/>) },
  { key:'haha',  label:'Haha',  color:'#E0AF68', svg:(c)=>(<><rect x="4" y="4" width="16" height="16" rx="3" fill="none" stroke={c} strokeWidth="1.6"/><path d="M7 13h10" stroke={c} strokeWidth="1.6" strokeLinecap="round"/><path d="M9 13c0 2 1 3 3 3s3-1 3-3" fill="none" stroke={c} strokeWidth="1.6" strokeLinecap="round"/><path d="M7 9l2 2M17 9l-2 2" stroke={c} strokeWidth="1.6" strokeLinecap="round"/></>) },
  { key:'wow',   label:'Wow',   color:'#BB9AF7', svg:(c)=>(<><circle cx="12" cy="12" r="9" fill="none" stroke={c} strokeWidth="1.8"/><circle cx="9"  cy="10" r="1.4" fill={c}/><circle cx="15" cy="10" r="1.4" fill={c}/><ellipse cx="12" cy="16" rx="2" ry="2.5" fill="none" stroke={c} strokeWidth="1.6"/></>) },
  { key:'sad',   label:'Sad',   color:'#7DCFFF', svg:(c)=>(<><circle cx="12" cy="12" r="9" fill="none" stroke={c} strokeWidth="1.8"/><path d="M8 16c1-2 2.5-3 4-3s3 1 4 3" fill="none" stroke={c} strokeWidth="1.8" strokeLinecap="round"/><circle cx="9"  cy="10" r="1" fill={c}/><circle cx="15" cy="10" r="1" fill={c}/><path d="M9 13l-1 3" stroke={c} strokeWidth="1.4" strokeLinecap="round"/></>) },
  { key:'angry', label:'Angry', color:'#F7768E', svg:(c)=>(<><circle cx="12" cy="12" r="9" fill="none" stroke={c} strokeWidth="1.8"/><path d="M7 8l3 2M14 10l3-2" stroke={c} strokeWidth="1.8" strokeLinecap="round"/><circle cx="9"  cy="11" r="1" fill={c}/><circle cx="15" cy="11" r="1" fill={c}/><path d="M8 16c1-2 2.5-2.5 4-2.5s3 .5 4 2.5" fill="none" stroke={c} strokeWidth="1.8" strokeLinecap="round"/></>) },
];
const REACTIONS_BY_KEY = Object.fromEntries(REACTIONS.map(r => [r.key, r]));
function ReactionIcon({ r, size=18, glow=false }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" style={{ display:'block', filter: glow ? `drop-shadow(0 0 4px ${r.color})` : 'none', flexShrink:0 }}>
      {r.svg(r.color)}
    </svg>
  );
}
function ReactionPicker({ onPick, current }) {
  return (
    <div style={{ position:'absolute', bottom:'calc(100% + 6px)', left:0, zIndex:50,
      background:'#0A0E1A', border:'1px solid rgba(0,255,229,.3)', borderRadius:'8px',
      padding:'6px', boxShadow:'0 0 24px rgba(0,255,229,.15), 0 8px 30px rgba(0,0,0,.7)',
      display:'flex', gap:'2px', animation:'fadeUp .12s ease' }}>
      {REACTIONS.map(r => {
        const isActive = current === r.key;
        return (
          <button key={r.key} title={r.label} onClick={() => onPick(r.key)}
            style={{ width:'40px', height:'40px', borderRadius:'6px',
              background: isActive ? `${r.color}18` : 'transparent',
              border:`1px solid ${isActive ? r.color+'80' : 'transparent'}`,
              cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center',
              transition:'all .15s' }}
            onMouseEnter={e => { e.currentTarget.style.transform='translateY(-2px)'; e.currentTarget.style.background = `${r.color}22`; e.currentTarget.style.borderColor = r.color+'A0'; e.currentTarget.style.boxShadow = `0 0 10px ${r.color}50, inset 0 0 8px ${r.color}30`; }}
            onMouseLeave={e => { e.currentTarget.style.transform='translateY(0)'; e.currentTarget.style.background = isActive ? `${r.color}18` : 'transparent'; e.currentTarget.style.borderColor = isActive ? r.color+'80' : 'transparent'; e.currentTarget.style.boxShadow='none'; }}>
            <ReactionIcon r={r} size={22} glow={isActive} />
          </button>
        );
      })}
    </div>
  );
}

function PostDetail() {
  const [reaction, setReaction] = useState(null);
  const [likes, setLikes] = useState(POST.likes);
  const [showPicker, setShowPicker] = useState(false);
  const hoverTimer = useRef(null);
  const pickReaction = (key) => {
    if (reaction === key) { setReaction(null); setLikes(likes - 1); }
    else { if (!reaction) setLikes(likes + 1); setReaction(key); }
    setShowPicker(false);
  };
  const openPicker  = () => { clearTimeout(hoverTimer.current); setShowPicker(true); };
  const closePicker = () => { hoverTimer.current = setTimeout(() => setShowPicker(false), 250); };
  const [comment, setComment] = useState('');
  const [asAnon, setAsAnon] = useState(false);
  const [anonName, setAnonName] = useState('');
  const [showCP, setShowCP] = useState(false);
  const mood = MOOD_CFG[POST.mood];

  useEffect(() => {
    const h = e => { if ((e.metaKey||e.ctrlKey) && e.key==='k') { e.preventDefault(); setShowCP(c=>!c); } };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, []);

  return (
    <>
      <TopBar onOpenCP={() => setShowCP(true)} />
      <div style={{ display:'flex', marginTop:'52px', minHeight:'calc(100vh - 80px)', paddingBottom:'28px' }}>

        {/* Main */}
        <main style={{ flex:1, padding:'20px 32px', minWidth:0, maxWidth:'820px', margin:'0 auto' }} className="fade-up">

          {/* Breadcrumb */}
          <div style={{ display:'flex', alignItems:'center', gap:'8px', marginBottom:'20px', fontFamily:"'JetBrains Mono',monospace", fontSize:'13px', color:'#8B96AA' }}>
            <a href="MyBlog Feed.html" style={{ color:'#00FFE5', textDecoration:'none', display:'flex', alignItems:'center', gap:'4px' }}>← feed</a>
            <span style={{ color:'#566176' }}>/</span>
            <span>~/post/{POST.id}</span>
          </div>

          {/* Post header */}
          <div style={{ display:'flex', alignItems:'flex-start', gap:'12px', marginBottom:'16px' }}>
            <div style={{ width:'40px', height:'40px', borderRadius:'50%', border:'2px solid #00FFE5', background:'linear-gradient(135deg,#00FFE520,#BB9AF720)', display:'flex', alignItems:'center', justifyContent:'center', fontFamily:"'Space Grotesk',sans-serif", fontWeight:700, fontSize:'17px', color:'#00FFE5', flexShrink:0, boxShadow:'0 0 12px rgba(0,255,229,.2)' }}>A</div>
            <div style={{ flex:1, minWidth:0 }}>
              <div style={{ display:'flex', alignItems:'center', gap:'7px', marginBottom:'4px', flexWrap:'wrap' }}>
                <span style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'14px', fontWeight:600, color:'#7DCFFF' }}>~/admin</span>
                <span style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'10px', color:'#FF9E64', border:'1px solid #FF9E6450', borderRadius:'2px', padding:'0 4px' }}>[ ADMIN ]</span>
                <span style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'12px', color:'#566176' }}>·</span>
                <span style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'12px', color:'#8B96AA' }}>{POST.ts}</span>
              </div>
              <div style={{ display:'flex', alignItems:'center', gap:'6px' }}>
                <span className="pulse" style={{ color:'#9ECE6A', fontSize:'9px' }}>●</span>
                <span style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'12px', color:'#8B96AA' }}>{POST.time}</span>
              </div>
            </div>
            <span style={{ display:'inline-flex', alignItems:'center', gap:'5px', background:`${mood.color}18`, border:`1px solid ${mood.color}55`, borderRadius:'4px', padding:'3px 10px', fontFamily:"'JetBrains Mono',monospace", fontSize:'12px', color:mood.color, boxShadow:`0 0 10px ${mood.color}30`, whiteSpace:'nowrap', flexShrink:0, alignSelf:'flex-start' }}>
              {mood.emoji} {mood.label}
            </span>
          </div>

          {/* Content */}
          <PostContent content={POST.content} />

          {/* Image carousel */}
          <ImageCarousel count={POST.images} />

          {/* Tags */}
          <div style={{ display:'flex', flexWrap:'wrap', gap:'6px', marginBottom:'16px' }}>
            {POST.tags.map(tag => {
              const t = TAGS_DATA.find(x=>x.name===tag); const color = t?.color||'#00FFE5';
              return <span key={tag} style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'12px', color, background:`${color}15`, border:`1px solid ${color}40`, borderRadius:'4px', padding:'2px 8px', cursor:'pointer' }}>{tag}</span>;
            })}
          </div>

          {/* Actions */}
          <div style={{ display:'flex', gap:'2px', alignItems:'center', padding:'12px 0', borderTop:'1px solid #1F2A3A', borderBottom:'1px solid #1F2A3A', marginBottom:'24px' }}>
            <div style={{ position:'relative' }} onMouseEnter={openPicker} onMouseLeave={closePicker}>
              {showPicker && <ReactionPicker current={reaction} onPick={pickReaction} />}
              <button className="act-btn"
                onClick={() => pickReaction(reaction || 'like')}
                style={ reaction ? { color: REACTIONS_BY_KEY[reaction].color, textShadow:`0 0 8px ${REACTIONS_BY_KEY[reaction].color}60` } : {} }>
                {reaction
                  ? <ReactionIcon r={REACTIONS_BY_KEY[reaction]} size={17} glow={true} />
                  : <svg width="17" height="17" viewBox="0 0 24 24" style={{ display:'block' }}><rect x="3" y="11" width="4" height="9" stroke="#8B96AA" strokeWidth="1.6" fill="none"/><path d="M7 11l4-7c2 0 2.5 1.5 2 3l-1 2h5.5c1.5 0 2.5 1.5 2 3l-1.5 5.5c-.3 1.2-1.3 1.5-2.3 1.5H7" fill="none" stroke="#8B96AA" strokeWidth="1.6" strokeLinejoin="round"/></svg>}
                <span>{reaction ? REACTIONS_BY_KEY[reaction].label : 'React'}</span>
                <span style={{ marginLeft:'2px', color:'#566176' }}>· {likes}</span>
              </button>
            </div>
            <button className="act-btn"><span style={{ fontSize:'17px' }}>💬</span><span>{POST.comments}</span></button>
            <button className="act-btn"><span>↗</span><span>Share</span></button>
            <div style={{ marginLeft:'auto', fontFamily:"'JetBrains Mono',monospace", fontSize:'11px', color:'#8B96AA', display:'flex', gap:'12px' }}>
              <span>👁 {POST.views} views</span>
            </div>
          </div>

          {/* Comments */}
          <div>
            <div style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'14px', color:'#E6EDF3', marginBottom:'16px', display:'flex', alignItems:'center', gap:'8px' }}>
              <span style={{ color:'#00FFE5' }}>❯</span>
              <span>// comments</span>
              <span style={{ color:'#566176' }}>[{POST.comments}]</span>
            </div>

            {/* Comment form */}
            <div style={{ background:'#11151F', border:'1px solid #2A3548', borderRadius:'8px', padding:'14px', marginBottom:'20px' }}>
              <textarea className="comment-inp" rows={3} value={comment} onChange={e=>setComment(e.target.value)} placeholder="// add a comment..." />
              <div style={{ display:'flex', alignItems:'center', gap:'10px', marginTop:'10px' }}>
                {asAnon ? (
                  <input value={anonName} onChange={e=>setAnonName(e.target.value)} placeholder="your name (optional)"
                    style={{ flex:1, background:'#0A0E1A', border:'1px solid #2A3548', color:'#E6EDF3', fontFamily:"'JetBrains Mono',monospace", fontSize:'13px', padding:'6px 10px', borderRadius:'5px', outline:'none' }} />
                ) : (
                  <span style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'12px', color:'#7DCFFF', flex:1 }}>as: ~/admin</span>
                )}
                <button onClick={() => setAsAnon(!asAnon)} style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'11px', color:'#8B96AA', background:'#1A1F2E', border:'1px solid #2A3548', borderRadius:'4px', padding:'5px 10px', cursor:'pointer' }}>
                  {asAnon ? 'use account' : 'post as anon'}
                </button>
                <button style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'13px', color:'#00FFE5', background:'rgba(0,255,229,.08)', border:'1px solid rgba(0,255,229,.35)', borderRadius:'5px', padding:'6px 16px', cursor:'pointer' }}>
                  ↵ Send
                </button>
              </div>
            </div>

            {/* Comment list */}
            {COMMENTS.map(c => <CommentItem key={c.id} c={c} />)}
          </div>
        </main>

        {/* Meta panel */}
        <aside className="meta-panel" style={{ width:'260px', minWidth:'260px', background:'#11151F', borderLeft:'1px solid #1F2A3A', padding:'20px 16px', position:'sticky', top:'52px', height:'calc(100vh - 52px - 28px)', overflowY:'auto' }}>

          <div style={{ marginBottom:'20px' }}>
            <div className="sb-lbl">// post.meta</div>
            {[['ID', POST.id], ['Views', POST.views], ['Likes', likes], ['Comments', POST.comments]].map(([k,v]) => (
              <div key={k} style={{ display:'flex', justifyContent:'space-between', padding:'5px 0', borderBottom:'1px solid #1A1F2E' }}>
                <span style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'12px', color:'#8B96AA' }}>{k}</span>
                <span style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'12px', color:'#E6EDF3' }}>{v}</span>
              </div>
            ))}
          </div>

          <div style={{ marginBottom:'20px' }}>
            <div className="sb-lbl">// tags</div>
            <div style={{ display:'flex', flexWrap:'wrap', gap:'5px' }}>
              {POST.tags.map(tag => { const t = TAGS_DATA.find(x=>x.name===tag); const col = t?.color||'#00FFE5';
                return <span key={tag} style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'11px', color:col, background:`${col}15`, border:`1px solid ${col}40`, borderRadius:'4px', padding:'2px 7px' }}>{tag}</span>;
              })}
            </div>
          </div>

          <div style={{ marginBottom:'20px' }}>
            <div className="sb-lbl">// share</div>
            <div style={{ display:'flex', flexDirection:'column', gap:'6px' }}>
              {[['Facebook','#1877F2'],['X (Twitter)','#E6EDF3'],['Telegram','#2AABEE'],['Copy link','#00FFE5']].map(([label, color]) => (
                <button key={label} className="share-btn" style={{ color }}>
                  <span style={{ fontSize:'13px' }}>{label === 'Copy link' ? '🔗' : label === 'Facebook' ? '📘' : label === 'Telegram' ? '✈️' : '🐦'}</span>
                  {label}
                </button>
              ))}
            </div>
          </div>

          <div>
            <div className="sb-lbl">// related</div>
            {POSTS_DATA.filter(p=>p.id!==POST.id).slice(0,2).map(p => {
              const m = MOOD_CFG[p.mood];
              return (
                <a key={p.id} href="#" style={{ textDecoration:'none', display:'block', padding:'10px', background:'#1A1F2E', border:'1px solid #2A3548', borderRadius:'6px', marginBottom:'8px', transition:'border-color .15s' }}
                  className="cp-item" style={{ textDecoration:'none', display:'block', padding:'10px', background:'#1A1F2E', border:'1px solid #2A3548', borderRadius:'6px', marginBottom:'8px' }}>
                  <div style={{ display:'flex', alignItems:'center', gap:'5px', marginBottom:'4px' }}>
                    <span style={{ fontSize:'12px' }}>{m.emoji}</span>
                    <span style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'10px', color:m.color }}>{m.label}</span>
                    <span style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'10px', color:'#566176', marginLeft:'auto' }}>{p.time}</span>
                  </div>
                  <p style={{ fontSize:'13px', color:'#C9D1D9', lineHeight:'1.4' }}>{p.content.slice(0,80)}…</p>
                </a>
              );
            })}
          </div>
        </aside>
      </div>

      <StatusBar path={`~/post/${POST.id}`} info={`${POST.views} views · ${POST.comments} comments`} />
      {showCP && <CommandPalette onClose={() => setShowCP(false)} />}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(PostDetail));
</script>
</body>
</html>
