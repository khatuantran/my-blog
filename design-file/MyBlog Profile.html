<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
html,body { height:100%; }
body {
  background:#0A0E1A;
  background-image:radial-gradient(circle,#2A354822 1px,transparent 1px);
  background-size:24px 24px;
  color:#E6EDF3; font-family:'Inter',sans-serif; overflow-x:hidden;
}
body::after {
  content:''; position:fixed; top:0; left:0; right:0; bottom:0;
  background:repeating-linear-gradient(0deg,transparent 0px,transparent 2px,rgba(0,0,0,.028) 2px,rgba(0,0,0,.028) 4px);
  pointer-events:none; z-index:9999;
}
@keyframes fadeUp   { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }
@keyframes pulse    { 0%,100%{opacity:.7} 50%{opacity:1;filter:drop-shadow(0 0 3px currentColor)} }
@keyframes glitch {
  0%,87%,100%{ text-shadow:none; transform:none; }
  88%{ text-shadow:2px 0 #FF6E96,-2px 0 #00FFE5; transform:skewX(-2deg) translateX(-2px); }
  90%{ text-shadow:-2px 0 #BB9AF7,2px 0 #FF9E64;  transform:skewX(1deg) translateX(1px); }
  92%{ text-shadow:none; transform:none; }
}
@keyframes borderRotate {
  from { transform:rotate(0deg); }
  to   { transform:rotate(360deg); }
}
::-webkit-scrollbar { width:5px; } ::-webkit-scrollbar-track { background:#0A0E1A; } ::-webkit-scrollbar-thumb { background:#2A3548; border-radius:3px; }
.pulse { animation:pulse 2s ease-in-out infinite; }
.glitch { animation:glitch 8s infinite; display:inline-block; }
.srch-inp { width:100%; background:#0A0E1A; border:1px solid #2A3548; color:#A0AEC0; font-family:'JetBrains Mono',monospace; font-size:14px; padding:8px 70px 8px 36px; border-radius:6px; outline:none; transition:all .15s; }
.srch-inp:focus { border-color:#00FFE5; box-shadow:0 0 14px rgba(0,255,229,.22); color:#E6EDF3; }
.srch-inp::placeholder { color:#8B96AA; font-style:italic; }
.cp-item { display:flex; align-items:center; gap:10px; padding:8px 16px; cursor:pointer; transition:background .1s; }
.cp-item:hover { background:rgba(0,255,229,.08); }
.fade-up { animation:fadeUp .25s ease; }
.sb-lbl { font-family:'JetBrains Mono',monospace; font-size:11px; color:#8B96AA; letter-spacing:.05em; margin-bottom:10px; display:flex; align-items:center; gap:8px; }
.sb-lbl::after { content:''; flex:1; height:1px; background:#1F2A3A; }
.tab-btn { font-family:'JetBrains Mono',monospace; font-size:13px; padding:6px 16px; border:none; background:transparent; color:#8B96AA; cursor:pointer; border-bottom:2px solid transparent; transition:all .15s; }
.tab-btn.active { color:#00FFE5; border-bottom-color:#00FFE5; }
.tab-btn:hover:not(.active) { color:#C9D1D9; }
.post-mini { background:#11151F; border:1px solid #2A3548; border-radius:8px; padding:14px 16px; transition:all .2s; cursor:pointer; animation:fadeUp .3s ease both; }
.post-mini:hover { border-color:rgba(0,255,229,.4); box-shadow:0 0 18px rgba(0,255,229,.08); }
.post-mini::before { content:''; display:block; position:absolute; top:0; left:0; right:0; height:1px; background:linear-gradient(90deg,transparent,rgba(0,255,229,.3),transparent); opacity:0; transition:opacity .2s; }
.post-mini:hover::before { opacity:1; }
.skill-badge { font-family:'JetBrains Mono',monospace; font-size:12px; padding:4px 10px; border-radius:4px; border:1px solid; display:inline-flex; align-items:center; gap:5px; }
.edit-inp { width:100%; background:#070A14; border:1px solid #2A3548; color:#E6EDF3; font-family:'JetBrains Mono',monospace; font-size:14px; padding:8px 12px; border-radius:6px; outline:none; transition:all .15s; }
.edit-inp:focus { border-color:#00FFE5; box-shadow:0 0 10px rgba(0,255,229,.15); }
.edit-inp::placeholder { color:#8B96AA; }
.edit-lbl { font-family:'JetBrains Mono',monospace; font-size:11px; color:#8B96AA; letter-spacing:.05em; margin-bottom:5px; display:block; }
@keyframes slideIn { from{opacity:0;transform:translateX(40px)} to{opacity:1;transform:none} }
@media(max-width:1024px) { .right-col { display:none !important; } }
@media(max-width:768px) { .profile-hero { flex-direction:column !important; align-items:flex-start !important; } }

/* Post-bump fixes — keep small UI badges/pills/labels on one line */
span[style*="JetBrains Mono"], span[style*="JetBrains Mono,monospace"] { white-space: nowrap; }
/* Mood badges, filter chips, stat deltas — inline-flex content must not wrap */
[style*="inline-flex"][style*="JetBrains Mono"] { flex-shrink: 0; white-space: nowrap; }
/* Bracket badges like [ ADMIN ], [ v0.1.0 ] */
.flt-btn, .sort-btn, .filter-chip, .act-btn, .skill-badge, .tab-btn, .act-ghost { white-space: nowrap; flex-shrink: 0; }


/* Post-bump nowrap fixes v2 — broader, with restored wrap containers */
[style*="JetBrains"] { white-space: nowrap; }
.sb-lbl, .sb-lbl > *, .glitch { white-space: nowrap !important; }
/* Restore wrap-sensitive containers */
.code-bl, pre.code-bl { white-space: pre !important; }
.editor-area, .comment-inp, textarea { white-space: pre-wrap !important; }
.sb-lbl::after { white-space: normal !important; }


/* Mobile topbar — hide search to prevent overlap with logo/avatar */
@media (max-width: 820px) {
  header > div[style*="position: absolute"] { display: none !important; }
}
@media (max-width: 560px) {
  /* Hide version badge + online count on very small screens */
  header > div[style*="margin-left: auto"] > span:nth-child(1),
  header > div[style*="margin-left: auto"] > span:nth-child(2) { display: none !important; }
  /* Compact logo subtitle */
  header [style*="personal"] { display: none !important; }
}


/* ==== Mobile responsive v2 — real adaptive layout ==== */
@media (max-width: 980px) {
  /* Stack 4-col stat grids → 2 cols */
  [style*="grid-template-columns: repeat(4"],
  [style*="grid-template-columns:repeat(4"] {
    grid-template-columns: repeat(2, 1fr) !important;
  }
  /* Sub-bar items wrap */
  div[style*="height: 44px"][style*="border-bottom"] { flex-wrap: wrap !important; height: auto !important; padding-top: 8px !important; padding-bottom: 8px !important; row-gap: 6px !important; }
  /* Topbar nav: tighten */
  header { padding-left: 12px !important; padding-right: 12px !important; }
}
@media (max-width: 760px) {
  /* Main padding compression */
  main, [style*="padding: 20px 24px"], [style*="padding:'20px 24px'"] { padding-left: 14px !important; padding-right: 14px !important; }
  /* Tables with many cols → horizontal scroll instead of breaking */
  [style*="grid-template-columns: 3fr"],
  [style*="grid-template-columns: 2fr"] { min-width: 720px !important; }
  /* Wrap their containers so they scroll instead of overlap */
  div[style*="border-radius: 8px"][style*="overflow: hidden"]:has([style*="grid-template-columns: 3fr"]),
  div[style*="border-radius: 8px"][style*="overflow: hidden"]:has([style*="grid-template-columns: 2fr"]) {
    overflow-x: auto !important;
  }
  /* Stat cards smaller */
  [style*="font-size: 22px"][style*="font-weight: 700"],
  [style*="font-size:22px"] { font-size: 18px !important; }
  /* Hero on Profile: stack and shrink */
  .profile-hero { flex-direction: column !important; align-items: flex-start !important; gap: 12px !important; }
  /* Modal full-bleed-ish */
  [style*="width: 640px"], [style*="width: 560px"], [style*="width: 540px"], [style*="width: 480px"], [style*="width: 440px"], [style*="width: 420px"], [style*="width: 400px"], [style*="width: 380px"], [style*="width: 360px"] {
    width: calc(100vw - 24px) !important;
    max-width: calc(100vw - 24px) !important;
  }
  /* Right drawer (profile settings) full-width */
  [style*="width: 480px"][style*="height: 100vh"] { width: 100vw !important; }
  /* Hide Create Post preview column already gone via .preview-col */
  /* Big heading shrink */
  h1[style*="font-size: 26px"] { font-size: 22px !important; }
}
@media (max-width: 480px) {
  /* 2-col grids → 1 col */
  [style*="grid-template-columns: repeat(2"],
  [style*="grid-template-columns:repeat(2"] {
    grid-template-columns: 1fr !important;
  }
  /* Even tighter padding */
  main, [style*="padding: 24px 28px"], [style*="padding:'24px 28px'"] { padding-left: 12px !important; padding-right: 12px !important; }
  /* Login card padding */
  [style*="padding: 22px 20px"] { padding: 16px !important; }
  /* Status bar info — hide some segments */
  div[style*="bottom: 0"][style*="height: 28px"] span:nth-of-type(n+3) { display: none !important; }
}
/* Touch-friendly tap targets globally on mobile */
@media (max-width: 760px) and (pointer: coarse) {
  button, .toolbar-btn, .filter-chip, .sort-btn, .act-btn { min-height: 36px !important; }
}


/* ==== Mobile responsive v3 — prevent overflow + tight layout ==== */
html, body { max-width: 100vw; overflow-x: hidden; }
@media (max-width: 640px) {
  /* Topbar: bring right cluster fully inside viewport */
  header { padding-left: 10px !important; padding-right: 10px !important; gap: 0 !important; }
  header > div[style*="margin-left: auto"] { gap: 6px !important; }
  /* Logo: drop subtitle for sure, shrink */
  header svg { width: 20px !important; height: 20px !important; }
  /* Notification dropdown: full width near viewport */
  header [style*="width: 380px"] { width: calc(100vw - 20px) !important; right: -8px !important; }
  /* Avatar dropdown menu */
  header [style*="min-width: 210px"] { right: -4px !important; }
  /* Feed filter row: don't push 'Latest' off-screen with margin-left:auto */
  .flt-btn[style*="margin-left: auto"], button[style*="margin-left: auto"][style*="Latest"] {
    margin-left: 0 !important;
  }
  /* Common pattern: anything with margin-left:auto in a flex row at mobile becomes wrap-friendly */
  div[style*="display: flex"][style*="flex-wrap: wrap"] > [style*="margin-left: auto"] {
    margin-left: 0 !important;
  }
  /* Post cards: tighter padding */
  .post-card { padding: 14px !important; }
  /* Tags page card grid */
  div[style*="grid-template-columns: repeat(auto-fill, minmax(240px"] {
    grid-template-columns: 1fr !important;
  }
  div[style*="grid-template-columns: repeat(auto-fill, minmax(320px"] {
    grid-template-columns: 1fr !important;
  }
  /* Image grid in post: keep 2 columns max */
  .post-card div[style*="grid-template-columns: 1fr 1fr"] { gap: 2px !important; }
  /* Status bar: compress further */
  div[style*="bottom: 0"][style*="height: 28px"] { font-size: 10px !important; }
  div[style*="bottom: 0"][style*="height: 28px"] span { padding: 0 8px !important; }
  /* Sub-bars and toolbars: scroll horizontally if too tight */
  div[style*="top: 52px"][style*="height: 44px"] { overflow-x: auto !important; -webkit-overflow-scrolling: touch; }
  div[style*="top: 52px"][style*="height: 40px"] { overflow-x: auto !important; -webkit-overflow-scrolling: touch; }
}
@media (max-width: 420px) {
  /* Very small phones */
  .post-card { padding: 12px !important; }
  .post-card span[style*="position: absolute"][style*="top: 10px"] { display: none !important; } /* hide #post-id corner */
  /* Hide [v0.1.0] entirely on small screens (already in 560 but extra safety) */
  header span[style*="border: 1px solid"][style*="padding: 2px 7px"]:first-child { display: none !important; }
  /* Stat card values stay readable */
  [style*="font-size: 22px"][style*="font-weight: 700"] { font-size: 18px !important; }
}
/* Allow horizontal scroll on tables only, not whole page */
.row { min-width: 0 !important; }

</style>

<body>
<div id="root"></div>
<script type="text/babel" src="myblog-components.jsx"></script>
<script type="text/babel" src="myblog-shared-ui.jsx"></script>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── Profile data ────────────────────────────────────────────────
const PROFILE = {
  name: 'Trần Tuấn Kha',
  handle: '~/tuankha',
  role: 'ADMIN',
  born: 2001,
  title: 'Full-stack Developer',
  bio: 'Yêu code, yêu cà phê, yêu viết lách. Thích build những thứ nhỏ nhưng có ý nghĩa.\nSpecialized in React, Node.js, và mọi thứ liên quan đến web.',
  location: 'Hà Nội, Việt Nam',
  joined: '2024-01',
  github: 'github.com/tuankha',
  website: 'kha.blog',
  stats: { posts:42, likes:287, comments:64, views:1240, streak:12 },
};

const SKILLS = [
  { name:'TypeScript', color:'#7DCFFF' },
  { name:'React',      color:'#00FFE5' },
  { name:'Node.js',    color:'#9ECE6A' },
  { name:'Next.js',    color:'#E6EDF3' },
  { name:'PostgreSQL', color:'#BB9AF7' },
  { name:'Docker',     color:'#7DCFFF' },
  { name:'Prisma',     color:'#FF6E96' },
  { name:'Tailwind',   color:'#00FFE5' },
  { name:'Redis',      color:'#F7768E' },
  { name:'Git',        color:'#E0AF68' },
];

// 28-day contribution heatmap
const HEAT = [0,1,2,1,3,2,0, 1,3,2,3,1,0,2, 3,2,1,3,2,3,1, 0,2,3,2,1,2,3];
const heatColor = v => ['#1A1F2E','#2A3548','#00FFE535','#00FFE590'][v];
const DAY_LABELS = ['M','T','W','T','F','S','S'];

// Sparkline for profile stats
function StatSparkline({ data, color }) {
  const max = Math.max(...data), min = Math.min(...data), range = max-min||1, p = 2, w = 60, h = 20;
  const pts = data.map((v,i) => `${(i/(data.length-1))*w},${h-p-((v-min)/range)*(h-p*2)}`).join(' ');
  const gid = `psp${color.replace(/[^a-zA-Z0-9]/g,'')}`;
  return (
    <svg width={w} height={h} style={{ display:'block', overflow:'visible', flexShrink:0 }}>
      <defs><linearGradient id={gid} x1="0" x2="1"><stop offset="0%" stopColor={color} stopOpacity=".2"/><stop offset="100%" stopColor={color} stopOpacity="1"/></linearGradient></defs>
      <polyline points={pts} fill="none" stroke={`url(#${gid})`} strokeWidth="1.5" strokeLinejoin="round" strokeLinecap="round"/>
      <circle cx={w} cy={h-p-((data[data.length-1]-min)/range)*(h-p*2)} r="2.5" fill={color} style={{ filter:`drop-shadow(0 0 3px ${color})` }}/>
    </svg>
  );
}

// ── Avatar ──────────────────────────────────────────────────────
function ProfileAvatar({ size = 80 }) {
  return (
    <div style={{ position:'relative', width:size, height:size, flexShrink:0 }}>
      {/* Rotating neon ring */}
      <svg width={size} height={size} style={{ position:'absolute', top:0, left:0, animation:'borderRotate 8s linear infinite', zIndex:1, pointerEvents:'none' }}>
        <circle cx={size/2} cy={size/2} r={size/2-2} fill="none"
          stroke="url(#avatarGrad)" strokeWidth="2" strokeDasharray="6 4" />
        <defs>
          <linearGradient id="avatarGrad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stopColor="#00FFE5" stopOpacity="0.8"/>
            <stop offset="50%" stopColor="#BB9AF7" stopOpacity="0.4"/>
            <stop offset="100%" stopColor="#FF6E96" stopOpacity="0.6"/>
          </linearGradient>
        </defs>
      </svg>
      {/* Avatar body */}
      <div style={{ position:'absolute', top:4, left:4, right:4, bottom:4, borderRadius:'50%',
        background:'linear-gradient(135deg,#00FFE518,#BB9AF718)', border:'2px solid #00FFE5',
        display:'flex', alignItems:'center', justifyContent:'center', zIndex:2,
        boxShadow:'0 0 20px rgba(0,255,229,.2), inset 0 0 20px rgba(0,255,229,.05)' }}>
        <span style={{ fontFamily:"'Space Grotesk',sans-serif", fontWeight:700, fontSize:size/3, color:'#00FFE5',
          textShadow:'0 0 20px rgba(0,255,229,.8)' }}>K</span>
      </div>
      {/* Online dot */}
      <div style={{ position:'absolute', bottom:4, right:4, width:12, height:12, background:'#9ECE6A',
        borderRadius:'50%', border:'2px solid #0A0E1A', zIndex:3,
        boxShadow:'0 0 8px #9ECE6A', animation:'pulse 2s ease-in-out infinite' }} />
    </div>
  );
}

// ── Post mini card ───────────────────────────────────────────────
function PostMiniCard({ post, delay }) {
  const [liked, setLiked] = useState(false);
  const [likes, setLikes] = useState(post.likes);
  const mood = MOOD_CFG[post.mood];
  const tagColor = n => TAGS_DATA.find(t=>t.name===n)?.color||'#00FFE5';
  return (
    <div className="post-mini" style={{ position:'relative', animationDelay:`${delay}ms` }}>
      <span style={{ position:'absolute', top:'10px', right:'12px', fontFamily:"'JetBrains Mono',monospace", fontSize:'10px', color:'#2A3548' }}>#{post.id}</span>
      {/* Header */}
      <div style={{ display:'flex', alignItems:'center', gap:'8px', marginBottom:'10px' }}>
        <span style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'12px', color:'#8B96AA' }}>{post.ts}</span>
        <span style={{ marginLeft:'auto' }}>
          <span style={{ display:'inline-flex', alignItems:'center', gap:'4px', background:`${mood.color}18`, border:`1px solid ${mood.color}50`, borderRadius:'4px', padding:'2px 7px', fontFamily:"'JetBrains Mono',monospace", fontSize:'11px', color:mood.color }}>
            {mood.emoji} {mood.label}
          </span>
        </span>
      </div>
      {/* Content preview */}
      <p style={{ fontSize:'15px', lineHeight:'1.6', color:'#C9D1D9', marginBottom:'10px',
        display:'-webkit-box', WebkitLineClamp:3, WebkitBoxOrient:'vertical', overflow:'hidden' }}>
        {post.content.replace(/```[\s\S]*?```/g,'[code]').replace(/[#*`]/g,'').trim()}
      </p>
      {/* Images indicator */}
      {post.images > 0 && (
        <div style={{ display:'flex', gap:'4px', marginBottom:'10px' }}>
          {Array.from({length:Math.min(post.images,3)}).map((_,i) => {
            const cfgs=[{bg:'#081420',acc:'#00FFE5'},{bg:'#1A0A1E',acc:'#BB9AF7'},{bg:'#081A0C',acc:'#9ECE6A'}];
            const c=cfgs[i%3];
            return <div key={i} style={{ width:'40px', height:'30px', borderRadius:'4px', flexShrink:0, background:`repeating-linear-gradient(135deg,${c.bg} 0,${c.bg} 5px,${c.acc}15 5px,${c.acc}15 10px)` }} />;
          })}
          {post.images > 3 && <div style={{ width:'40px', height:'30px', borderRadius:'4px', background:'#1A1F2E', display:'flex', alignItems:'center', justifyContent:'center', fontFamily:"'JetBrains Mono',monospace", fontSize:'11px', color:'#8B96AA' }}>+{post.images-3}</div>}
        </div>
      )}
      {/* Tags */}
      <div style={{ display:'flex', flexWrap:'wrap', gap:'5px', marginBottom:'10px' }}>
        {post.tags.map(t => <span key={t} style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'11px', color:tagColor(t), background:`${tagColor(t)}15`, border:`1px solid ${tagColor(t)}40`, borderRadius:'3px', padding:'1px 6px' }}>{t}</span>)}
      </div>
      {/* Actions */}
      <div style={{ display:'flex', gap:'2px', alignItems:'center', paddingTop:'8px', borderTop:'1px solid #1A1F2E' }}>
        <button onClick={e=>{e.stopPropagation();setLiked(!liked);setLikes(liked?likes-1:likes+1)}}
          style={{ display:'flex', alignItems:'center', gap:'4px', padding:'4px 8px', borderRadius:'4px', border:'none', background:'transparent', color:liked?'#FF6E96':'#8B96AA', cursor:'pointer', fontFamily:"'JetBrains Mono',monospace", fontSize:'12px', transition:'all .15s' }}>
          <span>{liked?'❤':'♡'}</span><span>{likes}</span>
        </button>
        <button style={{ display:'flex', alignItems:'center', gap:'4px', padding:'4px 8px', borderRadius:'4px', border:'none', background:'transparent', color:'#8B96AA', cursor:'pointer', fontFamily:"'JetBrains Mono',monospace", fontSize:'12px' }}>
          💬 {post.comments}
        </button>
        <a href={`MyBlog Post Detail.html`} style={{ marginLeft:'auto', fontFamily:"'JetBrains Mono',monospace", fontSize:'11px', color:'#00FFE5', textDecoration:'none', padding:'4px 8px', border:'1px solid rgba(0,255,229,.25)', borderRadius:'4px', transition:'all .15s' }}>
          read →
        </a>
      </div>
    </div>
  );
}

// ── Edit Profile Drawer ──────────────────────────────────────────
function EditProfileDrawer({ profile, onSave, onClose }) {
  const [form, setForm] = useState({ ...profile });
  const [skills, setSkills] = useState(SKILLS.map(s => s.name));
  const [skillInput, setSkillInput] = useState('');
  const upd = (k, v) => setForm(f => ({ ...f, [k]: v }));
  const SKILL_COLORS = ['#7DCFFF','#00FFE5','#9ECE6A','#E6EDF3','#BB9AF7','#FF6E96','#E0AF68','#FF9E64'];
  const addSkill = () => {
    const s = skillInput.trim();
    if (s && !skills.includes(s)) setSkills([...skills, s]);
    setSkillInput('');
  };

  // Lock body scroll when drawer open
  useEffect(() => {
    document.body.style.overflow = 'hidden';
    return () => { document.body.style.overflow = ''; };
  }, []);

  return (
    <div style={{ position:'fixed', inset:0, zIndex:300, display:'flex', justifyContent:'flex-end' }}>
      <div style={{ position:'absolute', inset:0, background:'rgba(0,0,0,.7)', backdropFilter:'blur(6px)', zIndex:0 }} onClick={onClose} />

      {showCP && <CommandPalette onClose={() => setShowCP(false)} />}
      {showEdit && (
        <EditProfileDrawer
          profile={profile}
          onSave={f => setProfile(p => ({ ...p, ...f }))}
          onClose={() => setShowEdit(false)}
        />
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(ProfilePage));
</script>
</body>
</html>
