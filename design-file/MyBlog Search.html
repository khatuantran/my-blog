<style>
* { box-sizing:border-box; margin:0; padding:0; }
html,body { height:100%; }
body {

}
body::after { content:''; position:fixed; top:0; left:0; right:0; bottom:0; background:repeating-linear-gradient(0deg,transparent 0px,transparent 2px,rgba(0,0,0,.028) 2px,rgba(0,0,0,.028) 4px); pointer-events:none; z-index:9999; }

.pulse { animation:pulse 2s ease-in-out infinite; }
.fade-up { animation:fadeUp .2s ease both; }
.srch-inp { width:100%; background:#0A0E1A; border:1px solid #2A3548; color:#A0AEC0; font-family:'JetBrains Mono',monospace; font-size:14px; padding:8px 70px 8px 36px; border-radius:6px; outline:none; transition:all .15s; }

/* Post-bump fixes — keep small UI badges/pills/labels on one line */
span[style*="JetBrains Mono"], span[style*="JetBrains Mono,monospace"] { white-space: nowrap; }
/* Mood badges, filter chips, stat deltas — inline-flex content must not wrap */
[style*="inline-flex"][style*="JetBrains Mono"] { flex-shrink: 0; white-space: nowrap; }
/* Bracket badges like [ ADMIN ], [ v0.1.0 ] */
.flt-btn, .sort-btn, .filter-chip, .act-btn, .skill-badge, .tab-btn, .act-ghost { white-space: nowrap; flex-shrink: 0; }


/* Post-bump nowrap fixes v2 — broader, with restored wrap containers */
[style*="JetBrains"] { white-space: nowrap; }
.sb-lbl, .sb-lbl > *, .glitch { white-space: nowrap !important; }
/* Restore wrap-sensitive containers */
.code-bl, pre.code-bl { white-space: pre !important; }
.editor-area, .comment-inp, textarea { white-space: pre-wrap !important; }
.sb-lbl::after { white-space: normal !important; }


/* Mobile topbar — hide search to prevent overlap with logo/avatar */
@media (max-width: 820px) {
  header > div[style*="position: absolute"] { display: none !important; }
}
@media (max-width: 560px) {
  /* Hide version badge + online count on very small screens */
  header > div[style*="margin-left: auto"] > span:nth-child(1),
  header > div[style*="margin-left: auto"] > span:nth-child(2) { display: none !important; }
  /* Compact logo subtitle */
  header [style*="personal"] { display: none !important; }
}


/* ==== Mobile responsive v2 — real adaptive layout ==== */
@media (max-width: 980px) {
  /* Stack 4-col stat grids → 2 cols */
  [style*="grid-template-columns: repeat(4"],
  [style*="grid-template-columns:repeat(4"] {
    grid-template-columns: repeat(2, 1fr) !important;
  }
  /* Sub-bar items wrap */
  div[style*="height: 44px"][style*="border-bottom"] { flex-wrap: wrap !important; height: auto !important; padding-top: 8px !important; padding-bottom: 8px !important; row-gap: 6px !important; }
  /* Topbar nav: tighten */
  header { padding-left: 12px !important; padding-right: 12px !important; }
}
@media (max-width: 760px) {
  /* Main padding compression */
  main, [style*="padding: 20px 24px"], [style*="padding:'20px 24px'"] { padding-left: 14px !important; padding-right: 14px !important; }
  /* Tables with many cols → horizontal scroll instead of breaking */
  [style*="grid-template-columns: 3fr"],
  [style*="grid-template-columns: 2fr"] { min-width: 720px !important; }
  /* Wrap their containers so they scroll instead of overlap */
  div[style*="border-radius: 8px"][style*="overflow: hidden"]:has([style*="grid-template-columns: 3fr"]),
  div[style*="border-radius: 8px"][style*="overflow: hidden"]:has([style*="grid-template-columns: 2fr"]) {
    overflow-x: auto !important;
  }
  /* Stat cards smaller */
  [style*="font-size: 22px"][style*="font-weight: 700"],
  [style*="font-size:22px"] { font-size: 18px !important; }
  /* Hero on Profile: stack and shrink */
  .profile-hero { flex-direction: column !important; align-items: flex-start !important; gap: 12px !important; }
  /* Modal full-bleed-ish */
  [style*="width: 640px"], [style*="width: 560px"], [style*="width: 540px"], [style*="width: 480px"], [style*="width: 440px"], [style*="width: 420px"], [style*="width: 400px"], [style*="width: 380px"], [style*="width: 360px"] {
    width: calc(100vw - 24px) !important;
    max-width: calc(100vw - 24px) !important;
  }
  /* Right drawer (profile settings) full-width */
  [style*="width: 480px"][style*="height: 100vh"] { width: 100vw !important; }
  /* Hide Create Post preview column already gone via .preview-col */
  /* Big heading shrink */
  h1[style*="font-size: 26px"] { font-size: 22px !important; }
}
@media (max-width: 480px) {
  /* 2-col grids → 1 col */
  [style*="grid-template-columns: repeat(2"],
  [style*="grid-template-columns:repeat(2"] {
    grid-template-columns: 1fr !important;
  }
  /* Even tighter padding */
  main, [style*="padding: 24px 28px"], [style*="padding:'24px 28px'"] { padding-left: 12px !important; padding-right: 12px !important; }
  /* Login card padding */
  [style*="padding: 22px 20px"] { padding: 16px !important; }
  /* Status bar info — hide some segments */
  div[style*="bottom: 0"][style*="height: 28px"] span:nth-of-type(n+3) { display: none !important; }
}
/* Touch-friendly tap targets globally on mobile */
@media (max-width: 760px) and (pointer: coarse) {
  button, .toolbar-btn, .filter-chip, .sort-btn, .act-btn { min-height: 36px !important; }
}


/* ==== Mobile responsive v3 — prevent overflow + tight layout ==== */
html, body { max-width: 100vw; overflow-x: hidden; }
@media (max-width: 640px) {
  /* Topbar: bring right cluster fully inside viewport */
  header { padding-left: 10px !important; padding-right: 10px !important; gap: 0 !important; }
  header > div[style*="margin-left: auto"] { gap: 6px !important; }
  /* Logo: drop subtitle for sure, shrink */
  header svg { width: 20px !important; height: 20px !important; }
  /* Notification dropdown: full width near viewport */
  header [style*="width: 380px"] { width: calc(100vw - 20px) !important; right: -8px !important; }
  /* Avatar dropdown menu */
  header [style*="min-width: 210px"] { right: -4px !important; }
  /* Feed filter row: don't push 'Latest' off-screen with margin-left:auto */
  .flt-btn[style*="margin-left: auto"], button[style*="margin-left: auto"][style*="Latest"] {
    margin-left: 0 !important;
  }
  /* Common pattern: anything with margin-left:auto in a flex row at mobile becomes wrap-friendly */
  div[style*="display: flex"][style*="flex-wrap: wrap"] > [style*="margin-left: auto"] {
    margin-left: 0 !important;
  }
  /* Post cards: tighter padding */
  .post-card { padding: 14px !important; }
  /* Tags page card grid */
  div[style*="grid-template-columns: repeat(auto-fill, minmax(240px"] {
    grid-template-columns: 1fr !important;
  }
  div[style*="grid-template-columns: repeat(auto-fill, minmax(320px"] {
    grid-template-columns: 1fr !important;
  }
  /* Image grid in post: keep 2 columns max */
  .post-card div[style*="grid-template-columns: 1fr 1fr"] { gap: 2px !important; }
  /* Status bar: compress further */
  div[style*="bottom: 0"][style*="height: 28px"] { font-size: 10px !important; }
  div[style*="bottom: 0"][style*="height: 28px"] span { padding: 0 8px !important; }
  /* Sub-bars and toolbars: scroll horizontally if too tight */
  div[style*="top: 52px"][style*="height: 44px"] { overflow-x: auto !important; -webkit-overflow-scrolling: touch; }
  div[style*="top: 52px"][style*="height: 40px"] { overflow-x: auto !important; -webkit-overflow-scrolling: touch; }
}
@media (max-width: 420px) {
  /* Very small phones */
  .post-card { padding: 12px !important; }
  .post-card span[style*="position: absolute"][style*="top: 10px"] { display: none !important; } /* hide #post-id corner */
  /* Hide [v0.1.0] entirely on small screens (already in 560 but extra safety) */
  header span[style*="border: 1px solid"][style*="padding: 2px 7px"]:first-child { display: none !important; }
  /* Stat card values stay readable */
  [style*="font-size: 22px"][style*="font-weight: 700"] { font-size: 18px !important; }
}
/* Allow horizontal scroll on tables only, not whole page */
.row { min-width: 0 !important; }

<body>
<div id="root"></div>
<script type="text/babel" src="myblog-components.jsx"></script>
<script type="text/babel" src="myblog-shared-ui.jsx"></script>
<script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;

// ── Extended mock data ─────────────────────────────────────────
const ALL_POSTS = [
  ...POSTS_DATA,
  {
    id:'jkl345', time:'3d ago', ts:'[2026-05-15 11:00]', mood:'GRATEFUL',
    content:'Cảm ơn community đã support trong 1 năm qua. Từ con số 0, giờ blog đã có hơn 1000 lượt xem mỗi tháng. Mỗi comment, mỗi like đều là động lực cực lớn 🙏',
    images:0, files:[], tags:['#life','#grateful','#blog'], likes:56, comments:9, saved:false,
  },
  {
    id:'mno678', time:'5d ago', ts:'[2026-05-13 16:30]', mood:'EXCITED',
    content:'Vừa setup xong homelab với Proxmox + Docker Swarm. Self-hosted toàn bộ: Gitea, Nextcloud, Portainer, monitoring stack (Grafana + Prometheus). Chi phí: 0đ/tháng 🎉',
    images:3, files:[{ name:'homelab-setup.pdf', type:'pdf', size:'4.2 MB' }],
    tags:['#devops','#selfhosted','#homelab'], likes:38, comments:14, saved:true,
  },
];

const RECENT_SEARCHES = ['react hooks', '#code', 'deploy', 'cursor ai', '#books'];

// Highlight matching text
function Highlight({ text, query }) {
  if (!query.trim()) return <span>{text}</span>;
  const parts = text.split(new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi'));
  return (
    <span>
      {parts.map((p, i) =>
        p.toLowerCase() === query.toLowerCase()
          ? <mark key={i}>{p}</mark>
          : <span key={i}>{p}</span>
      )}
    </span>
  );
}

// ── Result card ────────────────────────────────────────────────
function ResultCard({ post, query, delay }) {
  const mood = MOOD_CFG[post.mood];
  const tagColor = n => TAGS_DATA.find(t=>t.name===n)?.color||'#00FFE5';
  const preview = post.content.replace(/```[\s\S]*?```/g,'[code]').replace(/[#*`]/g,'').trim();

  return (
    <a href="MyBlog Post Detail.html" style={{ textDecoration:'none' }}>
      <div className="result-card fade-up" style={{ animationDelay:`${delay}ms` }}>
        {/* Top row */}
        <div style={{ display:'flex', alignItems:'center', gap:'8px', marginBottom:'10px', flexWrap:'wrap' }}>
          <div style={{ width:'26px', height:'26px', borderRadius:'50%', border:'1.5px solid #00FFE5', background:'linear-gradient(135deg,#00FFE520,#BB9AF720)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:'12px', color:'#00FFE5', fontWeight:700, flexShrink:0 }}>A</div>
          <span style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'13px', color:'#7DCFFF' }}>~/admin</span>
          <span style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'10px', color:'#FF9E64', border:'1px solid #FF9E6440', borderRadius:'2px', padding:'0 4px' }}>[ ADMIN ]</span>
          <span style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'11px', color:'#8B96AA' }}>·</span>
          <span style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'11px', color:'#8B96AA' }}>{post.ts}</span>
          <span style={{ marginLeft:'auto', display:'inline-flex', alignItems:'center', gap:'4px', background:`${mood.color}18`, border:`1px solid ${mood.color}50`, borderRadius:'4px', padding:'2px 8px', fontFamily:"'JetBrains Mono',monospace", fontSize:'11px', color:mood.color }}>
            {mood.emoji} {mood.label}
          </span>
        </div>
        {/* Content preview */}
        <p style={{ fontSize:'15px', color:'#C9D1D9', lineHeight:'1.6', marginBottom:'10px',
          display:'-webkit-box', WebkitLineClamp:2, WebkitBoxOrient:'vertical', overflow:'hidden' }}>
          <Highlight text={preview.slice(0,200)} query={query} />
        </p>
        {/* Tags + stats */}
        <div style={{ display:'flex', alignItems:'center', gap:'6px', flexWrap:'wrap' }}>
          {post.tags.map(t => (
            <span key={t} style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'11px', color:tagColor(t), background:`${tagColor(t)}15`, border:`1px solid ${tagColor(t)}40`, borderRadius:'3px', padding:'1px 6px' }}>
              <Highlight text={t} query={query} />
            </span>
          ))}
          {post.files?.length > 0 && (
            <span style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'11px', color:'#F7768E', background:'rgba(247,118,142,.1)', border:'1px solid rgba(247,118,142,.3)', borderRadius:'3px', padding:'1px 6px' }}>
              📎 {post.files.length} file{post.files.length>1?'s':''}
            </span>
          )}
          <span style={{ marginLeft:'auto', fontFamily:"'JetBrains Mono',monospace", fontSize:'11px', color:'#566176', display:'flex', gap:'10px' }}>
            <span>♡ {post.likes}</span>
            <span>💬 {post.comments}</span>
          </span>
        </div>
        {/* Post ID */}
        <span style={{ position:'absolute', top:'10px', right:'14px', fontFamily:"'JetBrains Mono',monospace", fontSize:'10px', color:'#2A3548' }}>#{post.id}</span>
      </div>
    </a>
  );
}

// ── Search Page ─────────────────────────────────────────────────
function SearchPage() {
  const [query, setQuery] = useState('');
  const [activeFilter, setActiveFilter] = useState('all');
  const [activeMood, setActiveMood] = useState(null);
  const [showCP, setShowCP] = useState(false);
  const [blink, setBlink] = useState(true);
  const inputRef = useRef(null);

  useEffect(() => { inputRef.current?.focus(); }, []);
  useEffect(() => { const iv = setInterval(()=>setBlink(b=>!b), 530); return ()=>clearInterval(iv); }, []);
  useEffect(() => {
    const h = e => { if ((e.metaKey||e.ctrlKey)&&e.key==='k') { e.preventDefault(); setShowCP(c=>!c); } };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, []);

  // Search logic
  const results = useMemo(() => {
    let posts = ALL_POSTS;
    if (activeMood) posts = posts.filter(p => p.mood === activeMood);
    if (activeFilter === 'saved') posts = posts.filter(p => p.saved);
    if (activeFilter === 'files') posts = posts.filter(p => p.files?.length > 0);
    if (!query.trim()) return posts;
    const q = query.toLowerCase();
    return posts.filter(p =>
      p.content.toLowerCase().includes(q) ||
      p.tags.some(t => t.toLowerCase().includes(q)) ||
      p.mood.toLowerCase().includes(q) ||
      p.files?.some(f => f.name.toLowerCase().includes(q))
    );
  }, [query, activeFilter, activeMood]);

  const isEmpty = query.trim() === '';
  const noResults = !isEmpty && results.length === 0;

  return (
    <>
      <TopBar onOpenCP={() => setShowCP(true)} hideSearch={true} />

      <div style={{ marginTop:'52px', paddingBottom:'28px' }}>
        {/* ── Minimal Search hero ── */}
        <div style={{ borderBottom:'1px solid #1F2A3A', padding:'40px 0 28px' }}>
          <div style={{ maxWidth:'820px', margin:'0 auto', padding:'0 28px' }}>

            {/* Tiny label */}
            <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:'12px' }}>
              <span style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'11px', color:'#8B96AA' }}>
                <span style={{ color:'#00FFE5' }}>❯</span> search
              </span>
              {(query || activeFilter!=='all' || activeMood) && (
                <span style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'11px', color:'#566176' }}>
                  → {results.length} {results.length===1?'result':'results'}
                </span>
              )}
            </div>

            {/* Big clean input */}
            <div style={{ position:'relative', marginBottom:'14px' }}>
              <input
                ref={inputRef}
                value={query}
                onChange={e => setQuery(e.target.value)}
                placeholder="search posts, #tags, files..."
                style={{ width:'100%', background:'#11151F', border:'1px solid #2A3548', color:'#E6EDF3',
                  fontFamily:"'Inter',sans-serif", fontSize:'18px', padding:'14px 50px 14px 18px',
                  borderRadius:'10px', outline:'none', transition:'all .2s' }}
                onFocus={e => { e.target.style.borderColor='#00FFE5'; e.target.style.boxShadow='0 0 20px rgba(0,255,229,.12)'; }}
                onBlur={e => { e.target.style.borderColor='#2A3548'; e.target.style.boxShadow='none'; }}
              />
              {query ? (
                <button onClick={() => setQuery('')}
                  style={{ position:'absolute', right:'12px', top:'50%', transform:'translateY(-50%)', background:'none', border:'none', color:'#8B96AA', cursor:'pointer', fontSize:'20px', lineHeight:1, padding:'4px 8px' }}>×</button>
              ) : (
                <span style={{ position:'absolute', right:'14px', top:'50%', transform:'translateY(-50%)', fontFamily:"'JetBrains Mono',monospace", fontSize:'10px', color:'#566176', background:'#1A1F2E', border:'1px solid #2A3548', borderRadius:'4px', padding:'3px 8px', pointerEvents:'none' }}>⌘K</span>
              )}
            </div>

            {/* Compact filter row */}
            <div style={{ display:'flex', gap:'5px', alignItems:'center', flexWrap:'wrap' }}>
              {[['all','All'],['saved','Saved'],['files','Files']].map(([k,l]) => (
                <button key={k} className={`filter-chip${activeFilter===k?' active':''}`} onClick={() => setActiveFilter(k)}>{l}</button>
              ))}
              <span style={{ width:'1px', height:'16px', background:'#2A3548', margin:'0 4px' }} />
              {Object.entries(MOOD_CFG).map(([key, c]) => (
                <button key={key}
                  onClick={() => setActiveMood(activeMood===key?null:key)}
                  title={c.label}
                  style={{ width:'30px', height:'28px', display:'flex', alignItems:'center', justifyContent:'center',
                    border:'1px solid', borderRadius:'5px', cursor:'pointer', fontSize:'14px', transition:'all .15s',
                    background: activeMood===key?`${c.color}12`:'#1A1F2E',
                    borderColor: activeMood===key?`${c.color}70`:'#2A3548',
                    boxShadow: activeMood===key?`0 0 8px ${c.color}30`:'none' }}>
                  {c.emoji}
                </button>
              ))}
              {(query || activeFilter!=='all' || activeMood) && (
                <button onClick={() => { setQuery(''); setActiveFilter('all'); setActiveMood(null); }}
                  style={{ marginLeft:'auto', fontFamily:"'JetBrains Mono',monospace", fontSize:'11px', color:'#F7768E', background:'transparent', border:'none', cursor:'pointer', padding:'4px 8px' }}>
                  reset ×
                </button>
              )}
            </div>
          </div>
        </div>

        {/* ── Results ── */}
        <div style={{ maxWidth:'820px', margin:'0 auto' }}>
          {/* Main results */}
          <main style={{ padding:'24px 28px', minWidth:0 }}>

            {/* Empty state — no query */}
            {isEmpty && (
              <div style={{ animation:'fadeUp .3s ease' }}>
                {/* Recent searches */}
                <div style={{ marginBottom:'28px' }}>
                  <div className="sb-lbl">// recent.searches</div>
                  <div style={{ display:'flex', flexWrap:'wrap', gap:'8px' }}>
                    {RECENT_SEARCHES.map(s => (
                      <button key={s} onClick={() => setQuery(s)}
                        style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'13px', color:'#C9D1D9', background:'#11151F', border:'1px solid #2A3548', borderRadius:'6px', padding:'7px 14px', cursor:'pointer', transition:'all .15s', display:'flex', alignItems:'center', gap:'6px' }}>
                        <span style={{ color:'#566176', fontSize:'11px' }}>↺</span>{s}
                      </button>
                    ))}
                  </div>
                </div>

                {/* All tags */}
                <div style={{ marginBottom:'28px' }}>
                  <div className="sb-lbl">// browse.tags</div>
                  <div style={{ display:'flex', flexWrap:'wrap', gap:'8px' }}>
                    {TAGS_DATA.map(t => (
                      <button key={t.name} onClick={() => setQuery(t.name)}
                        style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'13px', color:t.color, background:`${t.color}10`, border:`1px solid ${t.color}40`, borderRadius:'6px', padding:'7px 14px', cursor:'pointer', transition:'all .15s', display:'flex', alignItems:'center', gap:'8px' }}>
                        {t.name}
                        <span style={{ fontSize:'11px', color:'#566176' }}>{t.count}</span>
                      </button>
                    ))}
                  </div>
                </div>

                {/* All posts preview */}
                <div>
                  <div className="sb-lbl">// all.posts <span style={{ color:'#566176', marginLeft:'4px' }}>{ALL_POSTS.length} total</span></div>
                  {ALL_POSTS.map((p,i) => <ResultCard key={p.id} post={p} query="" delay={i*50} />)}
                </div>
              </div>
            )}

            {/* Results found */}
            {!isEmpty && !noResults && (
              <div>
                <div className="sb-lbl">
                  // results
                  <span style={{ color:'#00FFE5', marginLeft:'2px' }}>{results.length}</span>
                  <span style={{ color:'#566176', marginLeft:'2px' }}>for "{query}"</span>
                </div>
                {results.map((p,i) => <ResultCard key={p.id} post={p} query={query} delay={i*50} />)}
              </div>
            )}

            {/* No results */}
            {noResults && (
              <div style={{ textAlign:'center', padding:'60px 20px', animation:'fadeUp .3s ease' }}>
                <div style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'32px', color:'#2A3548', marginBottom:'16px', lineHeight:1 }}>
                  ◎
                </div>
                <div style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'14px', color:'#8B96AA', marginBottom:'8px' }}>
                  // no results for "{query}"
                </div>
                <div style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'12px', color:'#566176', marginBottom:'20px' }}>
                  $ grep -r "{query}" ./posts --no-results
                </div>
                <div style={{ display:'flex', gap:'8px', justifyContent:'center', flexWrap:'wrap' }}>
                  <button onClick={() => setQuery('')}
                    style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'12px', color:'#00FFE5', background:'rgba(0,255,229,.08)', border:'1px solid rgba(0,255,229,.3)', borderRadius:'5px', padding:'6px 14px', cursor:'pointer' }}>
                    ← clear search
                  </button>
                  {RECENT_SEARCHES.slice(0,3).map(s => (
                    <button key={s} onClick={() => setQuery(s)}
                      style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'12px', color:'#8B96AA', background:'#11151F', border:'1px solid #2A3548', borderRadius:'5px', padding:'6px 14px', cursor:'pointer' }}>
                      try "{s}"
                    </button>
                  ))}
                </div>
              </div>
            )}
          </main>
        </div>
      </div>

      <StatusBar path="~/search" info={query ? `${results.length} results for "${query}"` : `${ALL_POSTS.length} posts indexed`} />
      {showCP && <CommandPalette onClose={() => setShowCP(false)} />}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(SearchPage));
</script>
</body>
</html>
