// Sparkline mini
function MiniSpark({ data, color }) {
  const max = Math.max(...data), min = Math.min(...data), range = max-min||1, p = 1, w = 50, h = 16;
  const pts = data.map((v,i) => `${(i/(data.length-1))*w},${h-p-((v-min)/range)*(h-p*2)}`).join(' ');
  return (
    <svg width={w} height={h} style={{ display:'block', overflow:'visible', flexShrink:0 }}>
      <polyline points={pts} fill="none" stroke={color} strokeWidth="1.5" strokeLinejoin="round" strokeLinecap="round" opacity="0.8"/>
      <circle cx={w} cy={h-p-((data[data.length-1]-min)/range)*(h-p*2)} r="2" fill={color} />
    </svg>
  );
}

// ── Tag Card ─────────────────────────────────────────────────────
function TagCard({ tag, onEdit, onDelete, delay }) {
  const spark = useMemo(() => Array.from({length:8}, (_,i) => Math.max(0, tag.count - Math.floor(Math.random()*3) + i)), [tag.id]);
  return (
    <div className="tag-card fade-up" style={{ animationDelay:`${delay}ms` }}
      onMouseEnter={e => { e.currentTarget.style.borderColor = tag.color+'60'; e.currentTarget.style.boxShadow = `0 0 20px ${tag.color}10`; }}
      onMouseLeave={e => { e.currentTarget.style.borderColor = '#2A3548'; e.currentTarget.style.boxShadow = ''; }}>
      {/* top accent bar */}
      <div style={{ position:'absolute', top:0, left:0, right:0, height:'2px', background:`linear-gradient(90deg,transparent,${tag.color}60,transparent)` }} />

      {/* Header */}
      <div style={{ display:'flex', alignItems:'flex-start', justifyContent:'space-between', marginBottom:'10px' }}>
        <div>
          <span style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'15px', fontWeight:600, color:tag.color, textShadow:`0 0 12px ${tag.color}50` }}>
            {tag.name}
          </span>
          <div style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'9px', color:'#566176', marginTop:'3px' }}>
            since {tag.created}
          </div>
        </div>
        <div style={{ display:'flex', gap:'4px' }}>
          <button className="act-btn" onClick={() => onEdit(tag)}
            style={{ color:'#7DCFFF', borderColor:'#7DCFFF40' }}>✎ edit</button>
          <button className="act-btn" onClick={() => onDelete(tag.id)}
            style={{ color:'#F7768E', borderColor:'#F7768E40' }}>✕</button>
        </div>
      </div>

      {/* Desc */}
      <p style={{ fontSize:'12px', color:'#8B96AA', lineHeight:'1.5', marginBottom:'12px', minHeight:'36px' }}>
        {tag.desc || <span style={{ color:'#566176', fontStyle:'italic' }}>// no description</span>}
      </p>

      {/* Stats row */}
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between' }}>
        <div style={{ display:'flex', alignItems:'center', gap:'6px' }}>
          <span style={{ fontFamily:"'Space Grotesk',sans-serif", fontWeight:700, fontSize:'20px', color:tag.color, lineHeight:1 }}>{tag.count}</span>
          <span style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'10px', color:'#566176' }}>posts</span>

// ── Edit / Create Modal ───────────────────────────────────────────
function TagModal({ tag, onSave, onClose }) {
  const isNew = !tag;
  const [name, setName]   = useState(tag?.name?.replace(/^#/,'') || '');
  const [color, setColor] = useState(tag?.color || '#00FFE5');
  const [desc, setDesc]   = useState(tag?.desc || '');
  const [error, setError] = useState('');
  const inputRef = useRef(null);

  useEffect(() => { inputRef.current?.focus(); document.body.style.overflow='hidden'; return () => { document.body.style.overflow=''; }; }, []);
  useEffect(() => { const h = e => { if (e.key==='Escape') onClose(); }; window.addEventListener('keydown', h); return () => window.removeEventListener('keydown', h); }, []);

  const save = () => {
    const n = name.trim().toLowerCase().replace(/\s+/g,'-');
    if (!n) { setError('[ERROR] tag name is required'); return; }
    if (!/^[a-z0-9-]+$/.test(n)) { setError('[ERROR] only letters, numbers, hyphens'); return; }
    onSave({ id: tag?.id || Date.now(), name:`#${n}`, color, desc, count: tag?.count||0, created: tag?.created || new Date().toISOString().slice(0,7) });
    onClose();
  };

  return (
    <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,.7)', backdropFilter:'blur(6px)', zIndex:300, display:'flex', alignItems:'center', justifyContent:'center' }}
      onClick={e => e.target===e.currentTarget && onClose()}>
      <div style={{ width:'440px', maxWidth:'95vw', background:'#11151F', border:'1px solid rgba(0,255,229,.25)', borderRadius:'12px', overflow:'hidden', boxShadow:'0 0 50px rgba(0,255,229,.1),0 24px 60px rgba(0,0,0,.7)', animation:'fadeUp .2s ease' }}>

        {/* Header */}
        <div style={{ padding:'16px 20px', borderBottom:'1px solid #1F2A3A', display:'flex', justifyContent:'space-between', alignItems:'center', background:'#0A0E1A' }}>
          <div>
            <div style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'11px', color:'#00FFE5' }}>{isNew ? '// create.tag' : '// edit.tag'}</div>
            <div style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'10px', color:'#566176', marginTop:'2px' }}>~/admin/tags/{isNew?'new':tag.name}</div>
          </div>
          <button onClick={onClose} style={{ background:'none', border:'none', color:'#8B96AA', cursor:'pointer', fontSize:'20px', lineHeight:1 }}>×</button>
        </div>

        <div style={{ padding:'20px' }}>
          {/* Preview */}
          <div style={{ marginBottom:'18px', padding:'12px 16px', background:'#1A1F2E', border:`1px solid ${color}30`, borderRadius:'8px', display:'flex', alignItems:'center', gap:'10px' }}>
            <span style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'16px', color, textShadow:`0 0 12px ${color}60` }}>#{name||'preview'}</span>
            <span style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'10px', color:'#566176' }}>// live preview</span>
          </div>

          {/* Name */}
          <div style={{ marginBottom:'14px' }}>
            <label style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'10px', color:'#8B96AA', display:'block', marginBottom:'5px' }}>TAG NAME</label>
            <div style={{ position:'relative' }}>
              <span style={{ position:'absolute', left:'10px', top:'50%', transform:'translateY(-50%)', fontFamily:"'JetBrains Mono',monospace", fontSize:'13px', color:color }}>#</span>
              <input ref={inputRef} className="edit-inp" value={name} onChange={e=>setName(e.target.value.replace(/^#/,''))}
                placeholder="tag-name" style={{ paddingLeft:'26px' }}
                onKeyDown={e => { if (e.key==='Enter') save(); }} />
            </div>
          </div>

          {/* Color picker */}
          <div style={{ marginBottom:'14px' }}>
            <label style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'10px', color:'#8B96AA', display:'block', marginBottom:'8px' }}>COLOR</label>
            <div style={{ display:'flex', gap:'8px', flexWrap:'wrap' }}>
              {NEON_COLORS.map(c => (
                <button key={c} onClick={() => setColor(c)}
                  style={{ width:'28px', height:'28px', borderRadius:'6px', background:c, border:`2px solid ${c===color?'#E6EDF3':c+'40'}`, cursor:'pointer', transition:'all .15s', boxShadow:c===color?`0 0 10px ${c}80`:undefined, transform:c===color?'scale(1.15)':'scale(1)' }} />
              ))}
              <div style={{ display:'flex', alignItems:'center', gap:'6px' }}>
                <input type="color" value={color} onChange={e=>setColor(e.target.value)}
                  style={{ width:'28px', height:'28px', border:'1px solid #2A3548', borderRadius:'6px', cursor:'pointer', padding:'0', background:'transparent' }} />
                <span style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'10px', color:'#8B96AA' }}>{color}</span>
              </div>
            </div>
          </div>

          {/* Description */}
          <div style={{ marginBottom:'18px' }}>
            <label style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'10px', color:'#8B96AA', display:'block', marginBottom:'5px' }}>DESCRIPTION <span style={{ color:'#566176' }}>(optional)</span></label>
            <textarea className="edit-inp" rows={2} value={desc} onChange={e=>setDesc(e.target.value)}
              placeholder="// mô tả tag này..."
              style={{ resize:'vertical', lineHeight:'1.6' }} />
          </div>

          {/* Error */}
          {error && (
            <div style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'11px', color:'#F7768E', background:'rgba(247,118,142,.08)', border:'1px solid rgba(247,118,142,.25)', borderRadius:'5px', padding:'8px 12px', marginBottom:'14px' }}>
              {error}
            </div>
          )}

          {/* Actions */}
          <div style={{ display:'flex', gap:'8px' }}>
            <button onClick={save}
              style={{ flex:1, fontFamily:"'JetBrains Mono',monospace", fontSize:'13px', fontWeight:600, color:'#0A0E1A', background:'#00FFE5', border:'none', borderRadius:'6px', padding:'10px', cursor:'pointer', boxShadow:'0 0 14px rgba(0,255,229,.3)' }}>
              {isNew ? '+ Create Tag' : '✓ Save Changes'}
            </button>
            <button onClick={onClose}
              style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'13px', color:'#8B96AA', background:'#1A1F2E', border:'1px solid #2A3548', borderRadius:'6px', padding:'10px 18px', cursor:'pointer' }}>
              Cancel
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Delete confirm ───────────────────────────────────────────────
function DeleteConfirm({ tag, onConfirm, onClose }) {
  useEffect(() => { document.body.style.overflow='hidden'; return () => { document.body.style.overflow=''; }; }, []);
  return (
    <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,.7)', backdropFilter:'blur(6px)', zIndex:300, display:'flex', alignItems:'center', justifyContent:'center' }}
      onClick={e => e.target===e.currentTarget && onClose()}>
      <div style={{ width:'360px', background:'#11151F', border:'1px solid rgba(247,118,142,.3)', borderRadius:'10px', padding:'24px', boxShadow:'0 0 30px rgba(247,118,142,.1),0 20px 50px rgba(0,0,0,.7)', animation:'fadeUp .2s ease', textAlign:'center' }}>
        <div style={{ fontSize:'28px', marginBottom:'12px' }}>⚠️</div>
        <div style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'12px', color:'#F7768E', marginBottom:'8px' }}>[CONFIRM DELETE]</div>
        <div style={{ fontSize:'14px', color:'#C9D1D9', marginBottom:'6px' }}>Delete tag <span style={{ color:tag.color, fontFamily:"'JetBrains Mono',monospace" }}>{tag.name}</span>?</div>
        <div style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'11px', color:'#8B96AA', marginBottom:'20px' }}>
          {tag.count} posts will lose this tag. This action cannot be undone.
        </div>
        <div style={{ display:'flex', gap:'8px', justifyContent:'center' }}>
          <button onClick={onConfirm}
            style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'12px', color:'#F7768E', background:'rgba(247,118,142,.1)', border:'1px solid rgba(247,118,142,.4)', borderRadius:'6px', padding:'8px 20px', cursor:'pointer' }}>
            ✕ Delete
          </button>
          <button onClick={onClose}
            style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'12px', color:'#8B96AA', background:'#1A1F2E', border:'1px solid #2A3548', borderRadius:'6px', padding:'8px 20px', cursor:'pointer' }}>
            Cancel
          </button>
        </div>
      </div>
    </div>
  );
}

// ── Tags Page ─────────────────────────────────────────────────────
function TagsPage() {
  const [tags, setTags]         = useState(INIT_TAGS);
  const [search, setSearch]     = useState('');
  const [sort, setSort]         = useState('count');
  const [view, setView]         = useState('grid');
  const [editTag, setEditTag]   = useState(null);
  const [showCreate, setShowCreate] = useState(false);
  const [deleteTag, setDeleteTag]   = useState(null);
  const [showCP, setShowCP]     = useState(false);
  const [toast, setToast]       = useState(null);

  useEffect(() => {
    const h = e => { if ((e.metaKey||e.ctrlKey)&&e.key==='k') { e.preventDefault(); setShowCP(c=>!c); } };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, []);

  const showToast = (msg, type='success') => {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 2500);
  };

  const filtered = useMemo(() => {
    let t = tags.filter(t => t.name.toLowerCase().includes(search.toLowerCase()) || t.desc?.toLowerCase().includes(search.toLowerCase()));
    if (sort === 'count')   t = [...t].sort((a,b) => b.count - a.count);
    if (sort === 'alpha')   t = [...t].sort((a,b) => a.name.localeCompare(b.name));
    if (sort === 'created') t = [...t].sort((a,b) => b.created.localeCompare(a.created));
    return t;
  }, [tags, search, sort]);

  const saveTag = (updated) => {
    if (tags.find(t => t.id === updated.id)) {
      setTags(tags.map(t => t.id===updated.id ? updated : t));
      showToast(`Updated ${updated.name}`);
    } else {
      setTags([updated, ...tags]);
      showToast(`Created ${updated.name}`, 'success');
    }
  };

  const confirmDelete = (id) => {
    const t = tags.find(x=>x.id===id);
    setDeleteTag(t);
  };

  const doDelete = () => {
    showToast(`Deleted ${deleteTag.name}`, 'error');
    setTags(tags.filter(t => t.id !== deleteTag.id));
    setDeleteTag(null);
  };

  const totalPosts = tags.reduce((s,t) => s+t.count, 0);

  return (
    <>
      <TopBar onOpenCP={() => setShowCP(true)} />

      {/* Sub-bar */}
      <div style={{ position:'fixed', top:'52px', left:0, right:0, height:'44px', background:'#11151F', borderBottom:'1px solid #1F2A3A', display:'flex', alignItems:'center', padding:'0 24px', gap:'12px', zIndex:90, fontFamily:"'JetBrains Mono',monospace", fontSize:'11px' }}>
        <span style={{ color:'#8B96AA' }}>~/tags</span>
        <span style={{ color:'#566176' }}>──</span>
        <span style={{ color:'#E6EDF3' }}>{tags.length} tags</span>
        <span style={{ color:'#566176' }}>·</span>
        <span style={{ color:'#8B96AA' }}>{totalPosts} total posts</span>
        <div style={{ marginLeft:'auto', display:'flex', gap:'8px' }}>
          <button onClick={() => setShowCreate(true)}
            style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'11px', color:'#0A0E1A', background:'#00FFE5', border:'none', borderRadius:'5px', padding:'5px 14px', cursor:'pointer', fontWeight:600, boxShadow:'0 0 10px rgba(0,255,229,.3)' }}>
            + New Tag
          </button>
        </div>
      </div>

      <div style={{ marginTop:'96px', padding:'20px 24px', paddingBottom:'40px', maxWidth:'1400px', margin:'96px auto 0' }}>

        {/* Stats row */}
        <div style={{ display:'grid', gridTemplateColumns:'repeat(4,1fr)', gap:'10px', marginBottom:'24px' }}>
          {[
            { label:'TOTAL TAGS',  value:tags.length,                                  color:'#00FFE5' },
            { label:'TOTAL POSTS', value:totalPosts,                                   color:'#BB9AF7' },
            { label:'MOST USED',   value:tags.reduce((a,b)=>b.count>a.count?b:a,tags[0])?.name, color:'#9ECE6A' },
            { label:'LEAST USED',  value:tags.reduce((a,b)=>b.count<a.count?b:a,tags[0])?.name, color:'#E0AF68' },
          ].map(s => (
            <div key={s.label} style={{ background:'#11151F', border:'1px solid #2A3548', borderLeft:`3px solid ${s.color}`, borderRadius:'7px', padding:'12px 16px' }}>
              <div style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'9px', color:'#8B96AA', letterSpacing:'.08em', marginBottom:'6px' }}>{s.label}</div>
              <div style={{ fontFamily:"'Space Grotesk',sans-serif", fontSize:'20px', fontWeight:700, color:s.color, lineHeight:1 }}>{s.value}</div>
            </div>
          ))}
        </div>

        {/* Toolbar */}
        <div style={{ display:'flex', alignItems:'center', gap:'10px', marginBottom:'18px', flexWrap:'wrap' }}>
          {/* Search */}
          <div style={{ position:'relative', flex:1, minWidth:'200px', maxWidth:'360px' }}>
            <span style={{ position:'absolute', left:'10px', top:'50%', transform:'translateY(-50%)', color:'#8B96AA', fontSize:'12px', pointerEvents:'none' }}>⌕</span>
            <input className="edit-inp" value={search} onChange={e=>setSearch(e.target.value)}
              placeholder="filter tags..."
              style={{ paddingLeft:'30px', paddingRight:search?'30px':'12px' }} />
            {search && <button onClick={() => setSearch('')} style={{ position:'absolute', right:'8px', top:'50%', transform:'translateY(-50%)', background:'none', border:'none', color:'#8B96AA', cursor:'pointer', fontSize:'14px' }}>×</button>}
          </div>

          {/* Sort */}
          <div style={{ display:'flex', gap:'4px' }}>
            <span style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'10px', color:'#566176', display:'flex', alignItems:'center', paddingRight:'4px' }}>sort:</span>
            {[['count','Most used'],['alpha','A→Z'],['created','Newest']].map(([k,l]) => (
              <button key={k} className={`sort-btn${sort===k?' active':''}`} onClick={() => setSort(k)}>{l}</button>
            ))}
          </div>

          {/* View toggle */}
          <div style={{ display:'flex', gap:'3px', marginLeft:'auto' }}>
            {[['grid','⊞'],['list','☰']].map(([k,icon]) => (
              <button key={k} onClick={() => setView(k)}
                style={{ width:'30px', height:'30px', borderRadius:'4px', border:'1px solid', cursor:'pointer', fontSize:'14px', display:'flex', alignItems:'center', justifyContent:'center', transition:'all .15s',
                  borderColor: view===k?'rgba(0,255,229,.5)':'#2A3548',
                  background: view===k?'rgba(0,255,229,.08)':'#1A1F2E',
                  color: view===k?'#00FFE5':'#8B96AA' }}>
                {icon}
              </button>
            ))}
          </div>
        </div>

        {/* Results count */}
        <div style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'10px', color:'#566176', marginBottom:'12px' }}>
          // showing {filtered.length} of {tags.length} tags
          {search && <span style={{ color:'#8B96AA' }}> · filter: "{search}"</span>}
        </div>

        {/* Grid view */}
        {view === 'grid' && (
          <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(240px,1fr))', gap:'12px' }}>
            {filtered.map((tag, i) => (
              <TagCard key={tag.id} tag={tag} onEdit={setEditTag} onDelete={confirmDelete} delay={i*30} />
            ))}
            {/* Create new card */}
            <div onClick={() => setShowCreate(true)}
              style={{ background:'transparent', border:'2px dashed #2A3548', borderRadius:'8px', padding:'16px', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:'8px', cursor:'pointer', minHeight:'140px', transition:'all .2s' }}
              onMouseEnter={e => { e.currentTarget.style.borderColor='rgba(0,255,229,.4)'; e.currentTarget.style.background='rgba(0,255,229,.03)'; }}
              onMouseLeave={e => { e.currentTarget.style.borderColor='#2A3548'; e.currentTarget.style.background='transparent'; }}>
              <span style={{ fontSize:'24px', color:'#2A3548' }}>+</span>
              <span style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'11px', color:'#566176' }}>create new tag</span>
            </div>
          </div>
        )}

        {/* List view */}
        {view === 'list' && (
          <div style={{ background:'#11151F', border:'1px solid #2A3548', borderRadius:'8px', overflow:'hidden' }}>
            {/* Header */}
            <div style={{ display:'grid', gridTemplateColumns:'2fr 3fr 1fr 1fr 1fr', padding:'10px 16px', background:'#0A0E1A', borderBottom:'1px solid #2A3548' }}>
              {['Tag','Description','Posts','Created','Actions'].map(h => (
                <span key={h} style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'10px', color:'#8B96AA', letterSpacing:'.05em' }}>{h}</span>
              ))}
            </div>
            {filtered.map((tag, i) => (
              <div key={tag.id} className="fade-up" style={{ display:'grid', gridTemplateColumns:'2fr 3fr 1fr 1fr 1fr', padding:'11px 16px', borderBottom:'1px solid #1A1F2E', alignItems:'center', animationDelay:`${i*20}ms`, transition:'background .15s' }}
                onMouseEnter={e => e.currentTarget.style.background='#1A1F2E'}
                onMouseLeave={e => e.currentTarget.style.background='transparent'}>
                <span style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'13px', color:tag.color, fontWeight:600 }}>{tag.name}</span>
                <span style={{ fontSize:'12px', color:'#8B96AA', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', paddingRight:'12px' }}>{tag.desc || <span style={{ color:'#566176', fontStyle:'italic' }}>—</span>}</span>
                <span style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'13px', color:'#C9D1D9', fontWeight:600 }}>{tag.count}</span>
                <span style={{ fontFamily:"'JetBrains Mono',monospace", fontSize:'11px', color:'#566176' }}>{tag.created}</span>
                <div style={{ display:'flex', gap:'5px' }}>
                  <button className="act-btn" onClick={() => setEditTag(tag)} style={{ color:'#7DCFFF', borderColor:'#7DCFFF40' }}>✎</button>
                  <button className="act-btn" onClick={() => confirmDelete(tag.id)} style={{ color:'#F7768E', borderColor:'#F7768E40' }}>✕</button>
                </div>
              </div>
            ))}
          </div>
        )}

        {/* Empty */}
        {filtered.length === 0 && (
          <div style={{ textAlign:'center', padding:'60px 20px', fontFamily:"'JetBrains Mono',monospace" }}>
            <div style={{ fontSize:'32px', color:'#2A3548', marginBottom:'12px' }}>◎</div>
            <div style={{ color:'#8B96AA', marginBottom:'6px' }}>// no tags matching "{search}"</div>
            <button onClick={() => setSearch('')} style={{ color:'#00FFE5', background:'rgba(0,255,229,.08)', border:'1px solid rgba(0,255,229,.3)', borderRadius:'5px', padding:'6px 14px', cursor:'pointer', fontFamily:"'JetBrains Mono',monospace", fontSize:'11px', marginTop:'8px' }}>clear filter</button>
          </div>
        )}
      </div>

      {/* Toast */}
      {toast && (
        <div style={{ position:'fixed', bottom:'44px', right:'20px', fontFamily:"'JetBrains Mono',monospace", fontSize:'12px',
          color: toast.type==='error'?'#F7768E':'#9ECE6A',
          background: toast.type==='error'?'rgba(247,118,142,.1)':'rgba(158,206,106,.1)',
          border: `1px solid ${toast.type==='error'?'rgba(247,118,142,.4)':'rgba(158,206,106,.4)'}`,
          borderRadius:'6px', padding:'10px 16px', boxShadow:'0 4px 20px rgba(0,0,0,.4)',
          animation:'slideDown .2s ease', zIndex:200 }}>
          {toast.type==='error'?'✕':'✓'} {toast.msg}
        </div>
      )}

      <StatusBar path="~/tags" info={`${tags.length} tags · ${totalPosts} posts`} />
      {(editTag || showCreate) && <TagModal tag={editTag||null} onSave={saveTag} onClose={() => { setEditTag(null); setShowCreate(false); }} />}
      {deleteTag && <DeleteConfirm tag={deleteTag} onConfirm={doDelete} onClose={() => setDeleteTag(null)} />}
      {showCP && <CommandPalette onClose={() => setShowCP(false)} />}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(TagsPage));
</script>
</body>
</html>
