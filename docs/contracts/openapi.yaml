info:
  title: MyBlog API
  description: REST + WebSocket contract — auto-generated from NestJS Swagger
  version: 0.2.0-alpha
  contact: {}
tags: []
servers:
  - url: http://localhost:3001
    description: Local dev
  - url: https://myblog-api.fly.dev
    description: Production
components:
  securitySchemes:
    cookie:
      type: apiKey
      in: cookie
      name: access_token
  schemas:
    RegisterDto:
      type: object
      properties:
        username:
          type: string
          example: kha
          minLength: 3
          maxLength: 32
        password:
          type: string
          example: strong-password-123
          minLength: 8
        email:
          type: string
          example: kha@example.com
      required:
        - username
        - password
    AuthUserDto:
      type: object
      properties:
        id:
          type: string
          example: cmpa14i8t000010ldmv5j5att
        username:
          type: string
          example: kha
        email:
          type: object
          example: kha@example.com
          nullable: true
        role:
          type: string
          enum:
            - ADMIN
            - USER
            - BANNED
          example: ADMIN
        avatarUrl:
          type: object
          example: https://...cloudinary.../avatar.jpg
          nullable: true
        avatarPublicId:
          type: object
          example: avatars/u-alice-1234
          nullable: true
        title:
          type: object
          example: Full-stack Developer
          nullable: true
        bio:
          type: object
          example: Bio markdown...
          nullable: true
        skills:
          description: Skills `[{ name, color }]`
          example:
            - name: TypeScript
              color: '#7DCFFF'
          type: array
          items:
            type: string
        name:
          type: object
          example: Kha Tran
          nullable: true
        location:
          type: object
          example: Ho Chi Minh City
          nullable: true
        bornYear:
          type: object
          example: 1995
          nullable: true
        github:
          type: object
          example: khatran
          nullable: true
        website:
          type: object
          example: https://kha.dev
          nullable: true
        createdAt:
          format: date-time
          type: string
          example: '2026-05-17T16:59:32.000Z'
      required:
        - id
        - username
        - email
        - role
        - avatarUrl
        - createdAt
    LoginDto:
      type: object
      properties:
        username:
          type: string
          example: kha
        password:
          type: string
          example: strong-password-123
      required:
        - username
        - password
    ChangePasswordDto:
      type: object
