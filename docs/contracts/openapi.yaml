info:
  title: MyBlog API
  description: REST + WebSocket contract — auto-generated from NestJS Swagger
  version: 0.2.0-alpha
  contact: {}
tags: []
servers:
  - url: http://localhost:3001
    description: Local dev
  - url: https://myblog-api.fly.dev
    description: Production
components:
  securitySchemes:
    cookie:
      type: apiKey
      in: cookie
      name: access_token
  schemas:
    RegisterDto:
      type: object
      properties:
        username:
          type: string
          example: kha
          minLength: 3
          maxLength: 32
        password:
          type: string
          example: strong-password-123
          minLength: 8
        email:
          type: string
          example: kha@example.com
      required:
        - username
        - password
    AuthUserDto:
      type: object
      properties:
        id:
          type: string
          example: cmpa14i8t000010ldmv5j5att
        username:
          type: string
          example: kha
        email:
          type: object
          example: kha@example.com
          nullable: true
        role:
          type: string
          enum:
            - ADMIN
            - USER
            - BANNED
          example: ADMIN
        avatarUrl:
          type: object
          example: https://...cloudinary.../avatar.jpg
          nullable: true
        createdAt:
          format: date-time
          type: string
          example: '2026-05-17T16:59:32.000Z'
      required:
        - id
        - username
        - email
        - role
        - avatarUrl
        - createdAt
    LoginDto:
      type: object
      properties:
        username:
          type: string
          example: kha
        password:
          type: string
          example: strong-password-123
      required:
        - username
        - password
    ChangePasswordDto:
      type: object
      properties:
        currentPassword:
          type: string
          example: current-pw
          minLength: 5
        newPassword:
          type: string
          example: new-pw
          minLength: 5
      required:
        - currentPassword
        - newPassword
    ActivityActorDto:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        avatarUrl:
          type: string
          nullable: true
      required:
        - id
        - username
        - avatarUrl
    ActivityTargetDto:
      type: object
      properties:
        type:
          type: string
          enum:
            - POST
            - COMMENT
        id:
          type: string
        snippet:
          type: string
          nullable: true
          description: Truncate 80 chars, null nếu target deleted
      required:
        - type
        - id
        - snippet
    ActivityItemDto:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum:
            - POST_CREATED
            - COMMENT_CREATED
            - LIKE_CREATED
            - SAVE_CREATED
        direction:
          type: string
          enum:
            - OUTGOING
            - INCOMING
        actor:
          $ref: '#/components/schemas/ActivityActorDto'
        target:
          $ref: '#/components/schemas/ActivityTargetDto'
        createdAt:
          format: date-time
          type: string
      required:
        - id
        - type
        - direction
        - actor
        - target
        - createdAt
    PaginatedActivityDto:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ActivityItemDto'
        total:
          type: number
        page:
          type: number
        limit:
          type: number
      required:
        - items
        - total
        - page
        - limit
    UserResponseDto:
      type: object
      properties:
        id:
          type: string
          example: cmpa14i8t000010ldmv5j5att
        username:
          type: string
          example: kha
        email:
          type: object
          example: kha@example.com
          nullable: true
        role:
          type: string
          enum:
            - ADMIN
            - USER
            - BANNED
          example: USER
        avatarUrl:
          type: object
          example: https://...cloudinary.../avatar.jpg
          nullable: true
        title:
          type: object
          example: Full-stack Developer
          nullable: true
        bio:
          type: object
          example: Bio markdown...
          nullable: true
        skills:
          description: Skills array `[{ name, color }]`
          example:
            - name: TypeScript
              color: '#7DCFFF'
          type: array
          items:
            type: string
        createdAt:
          format: date-time
          type: string
          example: '2026-05-17T16:59:32.000Z'
      required:
        - id
        - username
        - email
        - role
        - avatarUrl
        - createdAt
    PaginatedUsersDto:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/UserResponseDto'
        total:
          type: number
          example: 42
        page:
          type: number
          example: 1
        limit:
          type: number
          example: 20
      required:
        - items
        - total
        - page
        - limit
    SkillItemDto:
      type: object
      properties:
        name:
          type: string
          example: TypeScript
        color:
          type: string
          example: '#7DCFFF'
      required:
        - name
        - color
    UpdateUserDto:
      type: object
      properties:
        email:
          type: string
          example: kha@example.com
        avatarUrl:
          type: string
          example: https://res.cloudinary.com/.../avatar.jpg
        title:
          type: string
          example: Full-stack Developer
          maxLength: 80
        bio:
          type: string
          example: Bio markdown...
          maxLength: 500
        skills:
          description: Skills array — max 20 items
          type: array
          items:
            $ref: '#/components/schemas/SkillItemDto'
    SignUploadDto:
      type: object
      properties:
        folder:
          type: string
          example: myblog/posts
          description: 'Cloudinary folder (default: myblog)'
        publicId:
          type: string
          example: post-abc-image-1
          description: Optional public_id override
        resourceType:
          type: string
          enum:
            - image
            - raw
          example: image
          description: image cho PNG/JPG/WebP, raw cho PDF/DOC/...
      required:
        - resourceType
    SignedUploadParamsDto:
      type: object
      properties:
        signature:
          type: string
          example: abc123signaturehash
        timestamp:
          type: number
          example: 1715952000
        apiKey:
          type: string
          example: '123456789012345'
